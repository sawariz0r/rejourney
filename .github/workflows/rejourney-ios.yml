name: Rejourney Native iOS CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ios-swift-package:

    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate package boundary
        run: |
          test -f Package.swift
          test -f packages/ios/VERSION
          test -f packages/ios/Sources/Rejourney/Resources/PrivacyInfo.xcprivacy
          test ! -f packages/ios/Package.swift

          if rg --pcre2 -n 'RejourneyImpl|^\s*import\s+React\b|RCTPromise|RCTBridge|packages/react-native|import CommonCrypto|@objc\((?!RJNative)' packages/ios/Sources/Rejourney -g '*.swift'; then
            echo "Native iOS package must not import React, depend on packages/react-native, or expose non-native-prefixed Obj-C runtime names."
            exit 1
          fi

      - name: Validate iOS version
        run: |
          IOS_VERSION="$(tr -d '[:space:]' < packages/ios/VERSION)"
          SOURCE_VERSION="$(sed -n 's/.*static var version = "\(.*\)".*/\1/p' packages/ios/Sources/Rejourney/RejourneySDKInfo.swift)"
          echo "iOS VERSION: $IOS_VERSION"
          echo "SDK source version: $SOURCE_VERSION"
          test "$IOS_VERSION" = "$SOURCE_VERSION"

          if [[ "${GITHUB_REF_TYPE}" == "tag" && "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            TAG_VERSION="${GITHUB_REF_NAME#v}"
            test "$TAG_VERSION" = "$IOS_VERSION"
          fi

      - name: Build Swift package for iOS Simulator
        run: xcodebuild -scheme Rejourney -destination 'generic/platform=iOS Simulator' build CODE_SIGNING_ALLOWED=NO

      - name: Build Swift package for generic iOS
        run: xcodebuild -scheme Rejourney -destination 'generic/platform=iOS' build CODE_SIGNING_ALLOWED=NO

      - name: Run Swift tests
        run: |
          SIM_DEVICE="$(xcrun simctl list devices available | awk -F '[()]' '/iPhone/ {gsub(/^[ \t]+|[ \t]+$/, "", $1); print $1; exit}')"
          test -n "$SIM_DEVICE"
          xcodebuild -scheme Rejourney -destination "platform=iOS Simulator,name=$SIM_DEVICE" test CODE_SIGNING_ALLOWED=NO

      - name: Build native iOS example
        run: |
          xcodebuild \
            -project examples/ios-native/RejourneyNativeExample.xcodeproj \
            -scheme RejourneyNativeExample \
            -destination 'generic/platform=iOS Simulator' \
            build CODE_SIGNING_ALLOWED=NO

  release-ios-tag:
    runs-on: ubuntu-latest
    needs: ios-swift-package
    # Only auto-release on direct pushes to main, not PRs or tags
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check if VERSION changed
        id: version_check
        run: |
          VERSION="$(tr -d '[:space:]' < packages/ios/VERSION)"
          PREV_VERSION="$(git show HEAD~1:packages/ios/VERSION | tr -d '[:space:]')"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Current: $VERSION  Previous: $PREV_VERSION"

          if [ "$VERSION" != "$PREV_VERSION" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create and push iOS release tag
        if: steps.version_check.outputs.changed == 'true'
        env:
          VERSION: ${{ steps.version_check.outputs.version }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "::add-mask::$GH_TOKEN"
          TAG="v${VERSION}"

          if git ls-remote --tags origin "refs/tags/$TAG" | grep -q "$TAG"; then
            echo "Tag $TAG already exists — bump packages/ios/VERSION to a new value to release."
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$TAG"
          git push origin "$TAG"

          NOTES_FILE=".github/releases/ios-${VERSION}.md"
          NOTES_ARGS=(--generate-notes)
          if [ -f "$NOTES_FILE" ]; then
            NOTES_ARGS=(--notes-file "$NOTES_FILE")
          fi

          gh release create "$TAG" \
            --title "iOS SDK $TAG" \
            "${NOTES_ARGS[@]}" \
            --verify-tag
