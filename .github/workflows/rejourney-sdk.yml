name: Rejourney SDK CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # ------------------------------------------------------------------
  # SDK JOBS
  # ------------------------------------------------------------------
  sdk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: TypeScript check
        working-directory: ./packages/react-native
        run: npm run typescript

      - name: Lint
        working-directory: ./packages/react-native
        run: npm run lint --if-present

      - name: Dependency Audit
        working-directory: ./packages/react-native
        run: npm run audit:deps

      - name: Run unit tests
        working-directory: ./packages/react-native
        run: npm test

      - name: Build SDK
        working-directory: ./packages/react-native
        run: npm run prepack

      - name: Verify optional peer safety (built artifacts)
        working-directory: ./packages/react-native
        run: npm run verify:optional-peers

      - name: Verify package content
        working-directory: ./packages/react-native
        run: npm run verify:package

      - name: Verify package structure
        working-directory: ./packages/react-native
        run: |
           if [ ! -f "src/index.ts" ]; then echo "❌ Src missing"; exit 1; fi
           if [ ! -d "lib/commonjs" ]; then echo "❌ Build output missing"; exit 1; fi
           echo "✅ Package structure valid"

  # ------------------------------------------------------------------
  # METRO BUNDLE WITH OPTIONAL PEERS
  # Validates that Metro can trace through optional-peer code paths
  # (useNavigationTracking, useExpoRouterTracking) when those peers are
  # installed. Runs on Ubuntu — no Xcode/Gradle needed, just Metro.
  # This job would have caught the loader-abstraction Metro bug.
  # ------------------------------------------------------------------
  metro-optional-peers:
    needs: [sdk]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install monorepo dependencies
        run: npm ci --ignore-scripts

      - name: Build & pack SDK
        working-directory: ./packages/react-native
        run: |
          npm run prepack
          PACK_FILE=$(npm pack --json | node -e "process.stdout.write(JSON.parse(require('fs').readFileSync(0,'utf8'))[0].filename)")
          echo "PACK_FILE=$PACK_FILE" >> $GITHUB_ENV

      - name: Create bare RN validation app
        run: |
          npx --yes @react-native-community/cli init ValidationApp \
            --skip-install --skip-git-init \
            --directory /tmp/rj-optional-peers-${{ github.run_id }}
          echo "APP_DIR=/tmp/rj-optional-peers-${{ github.run_id }}" >> $GITHUB_ENV

      - name: Install SDK and optional peers
        run: |
          cd "$APP_DIR"
          npm install
          npm install "$GITHUB_WORKSPACE/packages/react-native/$PACK_FILE"
          npm install @react-navigation/native

      - name: Configure validation app (with nav peer)
        run: |
          node "$GITHUB_WORKSPACE/packages/react-native/scripts/configure-validation-app.js" \
            "$APP_DIR" --with-nav-peer

      - name: Metro bundle with @react-navigation/native
        run: |
          cd "$APP_DIR"
          BUNDLE_OUT="$APP_DIR/.rj-smoke"
          mkdir -p "$BUNDLE_OUT/assets"
          npx react-native bundle \
            --platform android \
            --dev false \
            --entry-file index.js \
            --bundle-output "$BUNDLE_OUT/main.bundle" \
            --assets-dest "$BUNDLE_OUT/assets" \
            --reset-cache

  # ------------------------------------------------------------------
  # MOBILE INTEGRATION CHECKS
  # ------------------------------------------------------------------
  mobile-integration:
    needs: [sdk]
    strategy:
      matrix:
        platform: [ios, android]
        app_type: [bare, expo]
    runs-on: ${{ matrix.platform == 'ios' && 'macos-latest' || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      
      - name: Setup Ruby (iOS)
        if: matrix.platform == 'ios'
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: false
      
      - name: Install CocoaPods (iOS)
        if: matrix.platform == 'ios'
        run: sudo gem install cocoapods xcpretty

      - name: Setup Java (Android)
        if: matrix.platform == 'android'
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        if: matrix.platform == 'android'
        uses: android-actions/setup-android@v3

      - name: Install monorepo dependencies
        run: npm ci --ignore-scripts

      - name: Bare RN — iOS install smoke (test-ios-install.sh)
        if: matrix.platform == 'ios' && matrix.app_type == 'bare'
        working-directory: ./packages/react-native
        env:
          REJOURNEY_INSTALL_TEST_DIR: /tmp/rejourney-ci-install-${{ github.run_id }}-${{ github.run_attempt }}-ios-bare
        run: chmod +x ./scripts/test-ios-install.sh && ./scripts/test-ios-install.sh

      - name: Bare RN — Android install smoke (test-android-install.sh)
        if: matrix.platform == 'android' && matrix.app_type == 'bare'
        working-directory: ./packages/react-native
        env:
          REJOURNEY_INSTALL_TEST_DIR: /tmp/rejourney-ci-install-${{ github.run_id }}-${{ github.run_attempt }}-android-bare
        run: chmod +x ./scripts/test-android-install.sh && ./scripts/test-android-install.sh

      - name: Build & Pack SDK (Expo matrix)
        if: matrix.app_type == 'expo'
        run: |
          cd packages/react-native && npm run prepack
          PACK_FILE=$(npm pack 2>&1 | tail -1 | sed 's/.*\///')
          echo "PACK_FILE=$PACK_FILE" >> $GITHUB_ENV

      - name: Create Test App (Expo)
        if: matrix.app_type == 'expo'
        run: |
          cd /tmp
          npx create-expo-app ValidationApp -t default

      - name: Install SDK in Test App (Expo)
        if: matrix.app_type == 'expo'
        run: |
          cd /tmp/ValidationApp
          npm install
          npm install "$GITHUB_WORKSPACE/packages/react-native/$PACK_FILE"

      - name: Build iOS (Expo)
        if: matrix.platform == 'ios' && matrix.app_type == 'expo'
        working-directory: /tmp/ValidationApp
        run: |
          npx expo prebuild --platform ios
          cd ios
          pod install
          xcodebuild -workspace ValidationApp.xcworkspace -scheme ValidationApp -configuration Debug -sdk iphonesimulator -destination 'generic/platform=iOS Simulator' clean build CODE_SIGNING_ALLOWED=NO | xcpretty

      - name: Build Android (Expo)
        if: matrix.platform == 'android' && matrix.app_type == 'expo'
        working-directory: /tmp/ValidationApp
        run: |
          npx expo prebuild --platform android
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

  # ------------------------------------------------------------------
  # PUBLISH SDK TO NPM
  # ------------------------------------------------------------------
  publish-sdk:
    needs: [mobile-integration, metro-optional-peers]
    if: success() && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build SDK
        working-directory: ./packages/react-native
        run: npm run prepack

      - name: Check version and publish
        working-directory: ./packages/react-native
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          PACKAGE_NAME=$(jq -r .name package.json)
          CURRENT_VERSION=$(jq -r .version package.json)
          echo "Package: $PACKAGE_NAME"
          echo "Local Version: $CURRENT_VERSION"
          
          # Use npm view to check the latest published version
          # If it returns 404, we assume version 0.0.0
          PUBLISHED_VERSION=$(npm view $PACKAGE_NAME version 2>/dev/null || echo "0.0.0")
          echo "Published Version: $PUBLISHED_VERSION"
          
          if [ "$CURRENT_VERSION" != "$PUBLISHED_VERSION" ]; then
             echo "🚀 Publishing version $CURRENT_VERSION to NPM..."
             npm publish --access public
          else
             echo "✅ Version $CURRENT_VERSION is already published. Skipping."
          fi
