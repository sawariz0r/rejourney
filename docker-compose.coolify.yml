name: rejourney

# ============================================================================
# Coolify-ready compose for rejourney — routing driven by the Coolify UI.
#
# Why no Traefik labels: Coolify does NOT interpolate ${VARS} inside compose
# labels, so hand-written Host(`${API_DOMAIN}`) rules reach Traefik literally
# and fail. Instead, routing is configured in Coolify's per-service "Domains"
# fields (values live in Coolify's config, not this file — so it stays clean
# and portable across redeploys). Set these in the UI:
#
#   Domains for api:           https://api.rejourney.prpl.se:3000,
#                              https://ingest.rejourney.prpl.se:3000
#   Domains for ingest-upload: https://ingest.rejourney.prpl.se:3001/upload
#   Domains for web:           https://app.rejourney.prpl.se:8080
#   (bootstrap + all *-worker services: leave empty)
#
# The :PORT is the container port; Coolify still serves on 443 externally.
# The /upload path-router out-prioritizes api's ingest catch-all by Traefik's
# default rule-length ordering. Verify post-deploy that /upload != /health.
#
# Other changes from the upstream self-host file:
#   - bootstrap: removed the `build:` block (no build context in a Coolify
#     compose deploy) — it pulls the published migration image instead.
#   - Removed the custom `rejourney-network` — Coolify manages the network and
#     attaches its proxy; services still resolve each other by service name.
#
# Dropped vs. the upstream Traefik setup (UI Domains can't express these):
#   - www->apex redirect. DASHBOARD_ORIGIN is apex-pinned, so don't expose www;
#     add a proxy-level redirect later if wanted.
#   - custom security-headers middleware. Add a proxy-level dynamic config if
#     you want HSTS etc.; Coolify applies its own compression.
#
# The API_DOMAIN / INGEST_DOMAIN / DASHBOARD_DOMAIN / WWW_DOMAIN env vars are
# no longer referenced and can be deleted from Coolify. The app still needs
# PUBLIC_API_URL / PUBLIC_INGEST_URL / PUBLIC_DASHBOARD_URL / DASHBOARD_ORIGIN.
# ============================================================================

x-app-env: &app-env
  DOCKER_ENV: "true"
  NODE_ENV: production
  LOG_LEVEL: ${LOG_LEVEL:-info}
  DATABASE_URL: ${DATABASE_URL}
  REDIS_URL: ${REDIS_URL}
  S3_ENDPOINT: ${S3_ENDPOINT}
  S3_PUBLIC_ENDPOINT: ${S3_PUBLIC_ENDPOINT:-}
  S3_REGION: ${S3_REGION:-us-east-1}
  S3_BUCKET: ${S3_BUCKET}
  S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID}
  S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY}
  JWT_SECRET: ${JWT_SECRET}
  JWT_SIGNING_KEY: ${JWT_SIGNING_KEY}
  INGEST_HMAC_SECRET: ${INGEST_HMAC_SECRET}
  STORAGE_ENCRYPTION_KEY: ${STORAGE_ENCRYPTION_KEY}
  SUPERWALL_API_KEY_ENCRYPTION_KEY: ${SUPERWALL_API_KEY_ENCRYPTION_KEY:-}
  REVENUECAT_API_KEY_ENCRYPTION_KEY: ${REVENUECAT_API_KEY_ENCRYPTION_KEY:-}
  PUBLIC_DASHBOARD_URL: ${PUBLIC_DASHBOARD_URL}
  PUBLIC_API_URL: ${PUBLIC_API_URL}
  PUBLIC_INGEST_URL: ${PUBLIC_INGEST_URL}
  DASHBOARD_ORIGIN: ${DASHBOARD_ORIGIN}
  TURNSTILE_SITE_KEY: ${TURNSTILE_SITE_KEY:-}
  TURNSTILE_SECRET_KEY: ${TURNSTILE_SECRET_KEY:-}
  GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
  GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
  STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
  STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
  SMTP_HOST: ${SMTP_HOST:-}
  SMTP_PORT: ${SMTP_PORT:-}
  SMTP_USER: ${SMTP_USER:-}
  SMTP_PASS: ${SMTP_PASS:-}
  SMTP_FROM: ${SMTP_FROM:-}
  SMTP_SECURE: ${SMTP_SECURE:-true}
  GEOIP_PREFER_MMDB: ${GEOIP_PREFER_MMDB:-true}
  GEOIP_MMDB_AUTO_DOWNLOAD: ${GEOIP_MMDB_AUTO_DOWNLOAD:-true}
  GEOIP_MMDB_URL: ${GEOIP_MMDB_URL:-https://cdn.jsdelivr.net/npm/geolite2-city/GeoLite2-City.mmdb.gz}
  GEOIP_MMDB_PATH: ${GEOIP_MMDB_PATH:-/tmp/rejourney/GeoLite2-City.mmdb}
  INGEST_MAX_OBJECT_BYTES: ${INGEST_MAX_OBJECT_BYTES:-26214400}
  INGEST_DEVICE_BYTES_PER_MINUTE: ${INGEST_DEVICE_BYTES_PER_MINUTE:-52428800}
  INGEST_DEVICE_BYTES_PER_DAY: ${INGEST_DEVICE_BYTES_PER_DAY:-2147483648}
  INGEST_PROJECT_BYTES_PER_MINUTE: ${INGEST_PROJECT_BYTES_PER_MINUTE:-536870912}
  INGEST_PROJECT_BYTES_PER_DAY: ${INGEST_PROJECT_BYTES_PER_DAY:-107374182400}
  INGEST_IP_BYTES_PER_MINUTE: ${INGEST_IP_BYTES_PER_MINUTE:-104857600}
  INGEST_IP_BYTES_PER_DAY: ${INGEST_IP_BYTES_PER_DAY:-5368709120}
  SHOW_ISSUE_DETECTION_UI: ${SHOW_ISSUE_DETECTION_UI:-true}
  ISSUE_DETECTION_API_URL: ${ISSUE_DETECTION_API_URL:-}
  ISSUE_DETECTION_SERVICE_SECRET: ${ISSUE_DETECTION_SERVICE_SECRET:-}
  REJOURNEY_INTERNAL_API_URL: ${REJOURNEY_INTERNAL_API_URL:-}
  REJOURNEY_INTERNAL_SERVICE_SECRET: ${REJOURNEY_INTERNAL_SERVICE_SECRET:-}

x-api-image: &api-image ghcr.io/rejourneyco/rejourney/api:${IMAGE_TAG:-latest}
x-web-image: &web-image ghcr.io/rejourneyco/rejourney/web:${IMAGE_TAG:-latest}
x-migration-image: &migration-image ghcr.io/rejourneyco/rejourney/migration:${IMAGE_TAG:-latest}

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-rejourney}
      POSTGRES_USER: ${POSTGRES_USER:-rejourney}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rejourney} -d ${POSTGRES_DB:-rejourney}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:8.4-alpine
    restart: unless-stopped
    command: >
      redis-server
      --save 900 1
      --loglevel warning
      --requirepass ${REDIS_PASSWORD}
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  bootstrap:
    image: *migration-image
    restart: "no"
    environment:
      <<: *app-env
      STORAGE_SYNC_LABEL: selfhosted-bootstrap
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command:
      - /bin/sh
      - -lc
      - |
        node --import tsx scripts/applyDatabaseSchema.ts && \
        node --import tsx scripts/seedIfDatabaseEmpty.ts && \
        node --import tsx scripts/bootstrapSystemData.ts && \
        node --import tsx scripts/syncStorageEndpoint.ts

  api:
    image: *api-image
    restart: unless-stopped
    environment:
      <<: *app-env
      PORT: "3000"
      COOKIE_SECURE: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      bootstrap:
        condition: service_completed_successfully
    # Routing via Coolify UI -> Domains for api:
    #   https://api.rejourney.prpl.se:3000,https://ingest.rejourney.prpl.se:3000
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3000/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 5

  ingest-upload:
    image: *api-image
    restart: unless-stopped
    command: ["node", "dist/uploadServer.js"]
    environment:
      <<: *app-env
      PORT: "3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      bootstrap:
        condition: service_completed_successfully
    # Routing via Coolify UI -> Domains for ingest-upload:
    #   https://ingest.rejourney.prpl.se:3001/upload
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3001/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 5

  web:
    image: *web-image
    restart: unless-stopped
    environment:
      NODE_ENV: production
      API_URL: http://api:3000
      VITE_TURNSTILE_SITE_KEY: ${TURNSTILE_SITE_KEY:-}
      SHOW_ISSUE_DETECTION_UI: ${SHOW_ISSUE_DETECTION_UI:-true}
    depends_on:
      api:
        condition: service_healthy
      bootstrap:
        condition: service_completed_successfully
    # Routing via Coolify UI -> Domains for web:
    #   https://app.rejourney.prpl.se:8080
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:8080', (r) => process.exit(r.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 5

  ingest-worker:
    image: *api-image
    restart: unless-stopped
    command: ["node", "dist/worker/ingestArtifactWorker.js"]
    healthcheck:
      disable: true
    environment:
      <<: *app-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      bootstrap:
        condition: service_completed_successfully

  replay-worker:
    image: *api-image
    restart: unless-stopped
    command: ["node", "dist/worker/replayArtifactWorker.js"]
    healthcheck:
      disable: true
    environment:
      <<: *app-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      bootstrap:
        condition: service_completed_successfully

  session-lifecycle-worker:
    image: *api-image
    restart: unless-stopped
    command: ["node", "dist/worker/sessionLifecycleWorker.js"]
    healthcheck:
      disable: true
    environment:
      <<: *app-env
    depends_on:
      postgres:
        condition: service_healthy
      bootstrap:
        condition: service_completed_successfully

  # Matches k8s/workers.yaml retention-worker CronJob (*/15 * * * *): single-shot runs with backlog drain.
  retention-worker:
    image: *api-image
    restart: unless-stopped
    healthcheck:
      disable: true
    command:
      - /bin/sh
      - -c
      - |
        set -eu
        while true; do
          node dist/worker/retentionWorker.js --once --drain-backlog --trigger=scheduled
          sleep 900
        done
    environment:
      <<: *app-env
    depends_on:
      postgres:
        condition: service_healthy
      bootstrap:
        condition: service_completed_successfully

  alert-worker:
    image: *api-image
    restart: unless-stopped
    command: ["node", "dist/worker/alertWorker.js"]
    healthcheck:
      disable: true
    environment:
      <<: *app-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      bootstrap:
        condition: service_completed_successfully

  revenue-sync-worker:
    image: *api-image
    restart: unless-stopped
    command: ["node", "dist/worker/revenueSyncWorker.js"]
    healthcheck:
      disable: true
    environment:
      <<: *app-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      bootstrap:
        condition: service_completed_successfully

volumes:
  pgdata:
  redisdata:
