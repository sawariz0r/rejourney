# Database Admin Tools
# pgWeb — no public Ingress; access via kubectl port-forward on a Tailscale-connected machine (dev_docs/admin-tools-private-access.md)

---
# PGWeb Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pgweb
  namespace: rejourney
  labels:
    app.kubernetes.io/part-of: rejourney
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pgweb
  template:
    metadata:
      labels:
        app: pgweb
    spec:
      containers:
        - name: pgweb
          image: sosedoff/pgweb:latest
          ports:
            - containerPort: 8081
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_DB
            - name: DATABASE_URL
              value: "postgres://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@postgres-app-rw:5432/$(POSTGRES_DB)?sslmode=disable"
          resources:
            requests:
              cpu: 5m
              memory: 24Mi
            limits:
              cpu: 50m
              memory: 48Mi

---
apiVersion: v1
kind: Service
metadata:
  name: pgweb
  namespace: rejourney
  labels:
    app.kubernetes.io/part-of: rejourney
spec:
  type: ClusterIP
  ports:
    - port: 8081
      targetPort: 8081
  selector:
    app: pgweb

