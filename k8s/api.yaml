# API Service Deployment for Rejourney
# Main backend API handling auth, dashboard, and ingest endpoints

---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: rejourney
  labels:
    app: api
    app.kubernetes.io/part-of: rejourney
spec:
  type: ClusterIP
  ports:
    - port: 3000
      targetPort: 3000
  selector:
    app: api

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: rejourney
  labels:
    app.kubernetes.io/part-of: rejourney
spec:
  replicas: 4  # On the 12 vCPU / 24 GiB node, four API pods keep ingest spikes from saturating the event loop
  minReadySeconds: 10  # Pod must stay Ready for 10s before old pods are killed — prevents premature cutover
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0  # Never take down existing pods first
      maxSurge: 4        # Start all new pods simultaneously; kill all old pods only after all new are stable
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      terminationGracePeriodSeconds: 30
      # Strongly prefer fsn1 (same DC as Postgres primary, pgbouncer, Redis master)
      # to avoid cross-DC latency on every DB/cache call. preferredDuring (not
      # required) so pods can overflow to HEL1 nodes if fsn1 is full or down, keeping
      # HA intact. Uses rejourney.co/datacenter label so any FSN1 node qualifies —
      # adding a second FSN1 node automatically becomes eligible without manifest changes.
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: rejourney.co/datacenter
                    operator: In
                    values: ["fsn1"]
      imagePullSecrets:
        - name: ghcr-secret
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: api
          image: ghcr.io/rejourneyco/rejourney/api:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "3000"
            - name: LOG_LEVEL
              value: "info"
            - name: NODE_OPTIONS
              value: "--max-old-space-size=2048"
            - name: DB_POOL_MAX
              value: "50"
            - name: COOKIE_SECURE
              value: "true"
            # Database
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: PGBOUNCER_URL
            # Redis
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: redis-secret
                  key: REDIS_URL
            - name: REDIS_SENTINEL_HOST
              value: "redis.rejourney.svc.cluster.local"
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: redis-secret
                  key: REDIS_PASSWORD
                  optional: true  # key added to secret in Phase 1-B; optional so pods start before then
            # S3
            - name: S3_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: s3-secret
                  key: S3_ENDPOINT
            - name: S3_PUBLIC_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: s3-secret
                  key: S3_PUBLIC_ENDPOINT
            - name: S3_BUCKET
              valueFrom:
                secretKeyRef:
                  name: s3-secret
                  key: S3_BUCKET
            - name: S3_REGION
              valueFrom:
                secretKeyRef:
                  name: s3-secret
                  key: S3_REGION
            - name: S3_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: s3-secret
                  key: S3_ACCESS_KEY_ID
            - name: S3_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: s3-secret
                  key: S3_SECRET_ACCESS_KEY
            # Auth secrets
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: JWT_SECRET
            - name: JWT_SIGNING_KEY
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: JWT_SIGNING_KEY
            - name: INGEST_HMAC_SECRET
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: INGEST_HMAC_SECRET
            - name: STORAGE_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: STORAGE_ENCRYPTION_KEY
            - name: QUERY_BUILDER_KEY
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: QUERY_BUILDER_KEY
                  optional: true
            - name: QUERY_BUILDER_MODEL
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: QUERY_BUILDER_MODEL
                  optional: true
            # OAuth
            - name: GITHUB_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: oauth-secret
                  key: GITHUB_CLIENT_ID
                  optional: true
            - name: GITHUB_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: oauth-secret
                  key: GITHUB_CLIENT_SECRET
                  optional: true
            - name: OAUTH_REDIRECT_BASE
              valueFrom:
                secretKeyRef:
                  name: oauth-secret
                  key: OAUTH_REDIRECT_BASE
                  optional: true
            # Stripe
            - name: STRIPE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: stripe-secret
                  key: STRIPE_SECRET_KEY
                  optional: true
            - name: STRIPE_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: stripe-secret
                  key: STRIPE_WEBHOOK_SECRET
                  optional: true
            # Turnstile
            - name: TURNSTILE_SITE_KEY
              valueFrom:
                secretKeyRef:
                  name: turnstile-secret
                  key: TURNSTILE_SITE_KEY
                  optional: true
            - name: TURNSTILE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: turnstile-secret
                  key: TURNSTILE_SECRET_KEY
                  optional: true
            # SMTP
            - name: SMTP_HOST
              valueFrom:
                secretKeyRef:
                  name: smtp-secret
                  key: SMTP_HOST
                  optional: true
            - name: SMTP_PORT
              valueFrom:
                secretKeyRef:
                  name: smtp-secret
                  key: SMTP_PORT
                  optional: true
            - name: SMTP_USER
              valueFrom:
                secretKeyRef:
                  name: smtp-secret
                  key: SMTP_USER
                  optional: true
            - name: SMTP_PASS
              valueFrom:
                secretKeyRef:
                  name: smtp-secret
                  key: SMTP_PASS
                  optional: true
            - name: SMTP_FROM
              valueFrom:
                secretKeyRef:
                  name: smtp-secret
                  key: SMTP_FROM
                  optional: true
            - name: SMTP_SECURE
              valueFrom:
                secretKeyRef:
                  name: smtp-secret
                  key: SMTP_SECURE
                  optional: true
            # Public URLs (from app-secret - set by k8s-sync-secrets.sh)
            - name: PUBLIC_DASHBOARD_URL
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: PUBLIC_DASHBOARD_URL
                  optional: true
            - name: PUBLIC_API_URL
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: PUBLIC_API_URL
                  optional: true
            - name: PUBLIC_INGEST_URL
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: PUBLIC_INGEST_URL
                  optional: true
            - name: DASHBOARD_ORIGIN
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: DASHBOARD_ORIGIN
                  optional: true
            # Ingest byte quotas (tuned for 100k+ sessions with burst uploads)
            - name: INGEST_PROJECT_BYTES_PER_MINUTE
              value: "5368709120"       # 5 GB/min (default was 512 MB)
            - name: INGEST_PROJECT_BYTES_PER_DAY
              value: "536870912000"     # 500 GB/day (default was 100 GB)
            - name: INGEST_IP_BYTES_PER_MINUTE
              value: "524288000"        # 500 MB/min (default was 100 MB, raised for CGNAT)
            # Monitoring
            - name: PUSHGATEWAY_URL
              value: "http://pushgateway.rejourney.svc.cluster.local:9091"
            - name: DEBUG_HEALTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: monitoring-tokens
                  key: debug-token
                  optional: true
          resources:
            requests:
              cpu: 1500m
              memory: 1Gi
            limits:
              cpu: "3000m"
              memory: 3Gi
          livenessProbe:
            httpGet:
              path: /health/live
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 4
            failureThreshold: 3

---
apiVersion: v1
kind: Service
metadata:
  name: ingest-upload
  namespace: rejourney
  labels:
    app: ingest-upload
    app.kubernetes.io/part-of: rejourney
spec:
  type: ClusterIP
  ports:
    - port: 3001
      targetPort: 3001
  selector:
    app: ingest-upload

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ingest-upload
  namespace: rejourney
  labels:
    app.kubernetes.io/part-of: rejourney
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: ingest-upload
  template:
    metadata:
      labels:
        app: ingest-upload
    spec:
      terminationGracePeriodSeconds: 30
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 80
              preference:
                matchExpressions:
                  - key: topology.kubernetes.io/zone
                    operator: In
                    values: ["fsn1-dc14"]
            - weight: 20
              preference:
                matchExpressions:
                  - key: workload
                    operator: In
                    values: ["worker"]
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: ingest-upload
                topologyKey: kubernetes.io/hostname
      imagePullSecrets:
        - name: ghcr-secret
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: ingest-upload
          image: ghcr.io/rejourneyco/rejourney/api:latest
          imagePullPolicy: Always
          command: ["node"]
          args: ["dist/uploadServer.js"]
          ports:
            - containerPort: 3001
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "3001"
            - name: LOG_LEVEL
              value: "info"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: PGBOUNCER_URL
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: redis-secret
                  key: REDIS_URL
            - name: REDIS_SENTINEL_HOST
              value: "redis.rejourney.svc.cluster.local"
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: redis-secret
                  key: REDIS_PASSWORD
                  optional: true  # key added to secret in Phase 1-B; optional so pods start before then
            - name: S3_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: s3-secret
                  key: S3_ENDPOINT
            - name: S3_PUBLIC_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: s3-secret
                  key: S3_PUBLIC_ENDPOINT
            - name: S3_BUCKET
              valueFrom:
                secretKeyRef:
                  name: s3-secret
                  key: S3_BUCKET
            - name: S3_REGION
              valueFrom:
                secretKeyRef:
                  name: s3-secret
                  key: S3_REGION
            - name: S3_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: s3-secret
                  key: S3_ACCESS_KEY_ID
            - name: S3_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: s3-secret
                  key: S3_SECRET_ACCESS_KEY
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: JWT_SECRET
            - name: JWT_SIGNING_KEY
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: JWT_SIGNING_KEY
            - name: INGEST_HMAC_SECRET
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: INGEST_HMAC_SECRET
            - name: STORAGE_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: STORAGE_ENCRYPTION_KEY
            - name: PUBLIC_INGEST_URL
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: PUBLIC_INGEST_URL
                  optional: true
            - name: PUBLIC_API_URL
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: PUBLIC_API_URL
                  optional: true
          resources:
            requests:
              cpu: 300m
              memory: 384Mi
            limits:
              cpu: "1500m"
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 5

---
# Database setup job - runs migrations then seeds config
# We combine these to ensure seeding only happens after successful migration
apiVersion: batch/v1
kind: Job
metadata:
  name: db-setup
  namespace: rejourney
  labels:
    app.kubernetes.io/part-of: rejourney
spec:
  ttlSecondsAfterFinished: 86400
  backoffLimit: 3
  template:
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      restartPolicy: OnFailure
      # Wait for postgres to be ready before starting migration
      initContainers:
        - name: wait-postgres
          image: postgres:18-alpine
          command:
            - /bin/sh
            - -c
            - |
              echo "Waiting for PostgreSQL to be ready..."
              until pg_isready -h postgres-app-rw -p 5432 -U rejourney; do
                echo "PostgreSQL not ready, waiting 5s..."
                sleep 5
              done
              echo "PostgreSQL is ready!"
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD
        - name: enable-pg-stat-statements
          image: postgres:18-alpine
          command:
            - /bin/sh
            - -c
            - |
              echo "Ensuring pg_stat_statements extension is installed..."
              until PGPASSWORD="$POSTGRES_PASSWORD" psql -h postgres-app-rw -p 5432 -U "$POSTGRES_USER" -d "$POSTGRES_DB" -c "CREATE EXTENSION IF NOT EXISTS pg_stat_statements;" >/dev/null; do
                echo "pg_stat_statements not ready yet, waiting 5s..."
                sleep 5
              done
              echo "pg_stat_statements ready."
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_DB
      containers:
        - name: setup
          image: ghcr.io/rejourneyco/rejourney/migration:latest
          # Run migrate, conditionally seed only brand-new databases, bootstrap
          # system rows, then sync DB-backed storage endpoint state from the
          # current Kubernetes S3 secret before app rollouts continue.
          command: ["/bin/sh", "-c"]
          args:
            - >-
              node --import tsx scripts/applyDatabaseSchema.ts
              && node --import tsx scripts/seedIfDatabaseEmpty.ts
              && node --import tsx scripts/bootstrapSystemData.ts
              && node --import tsx scripts/syncStorageEndpoint.ts
          env:
            - name: NODE_ENV
              value: production
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: PGBOUNCER_URL
            - name: S3_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: s3-secret
                  key: S3_ENDPOINT
            - name: S3_BUCKET
              valueFrom:
                secretKeyRef:
                  name: s3-secret
                  key: S3_BUCKET
            - name: S3_REGION
              valueFrom:
                secretKeyRef:
                  name: s3-secret
                  key: S3_REGION
            - name: S3_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: s3-secret
                  key: S3_ACCESS_KEY_ID
            - name: S3_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: s3-secret
                  key: S3_SECRET_ACCESS_KEY
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: JWT_SECRET
            - name: INGEST_HMAC_SECRET
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: INGEST_HMAC_SECRET
            - name: STORAGE_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: STORAGE_ENCRYPTION_KEY
