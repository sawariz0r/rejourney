# Session Backup CronJob
# Backs up completed sessions with replay recordings to Cloudflare R2
# under the existing rejourney-backup bucket (backups/sessions/).
#
# Runs weekly on Sunday at 4 AM UTC (after daily postgres-backup at 3 AM).
# Same pattern as backup.yaml — uses the same r2-backup-secret.

---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: session-backup
  namespace: rejourney
  labels:
    app.kubernetes.io/part-of: rejourney
spec:
  schedule: "0 4 * * 0"  # Sunday 4 AM UTC (weekly)
  concurrencyPolicy: Forbid  # Prevent overlapping runs
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      activeDeadlineSeconds: 7200  # 2 hour timeout
      backoffLimit: 1
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: session-backup
              image: postgres:18-alpine
              command:
                - /bin/sh
                - -c
                - |
                  set -e
                  
                  # Install aws-cli
                  apk add --no-cache aws-cli gzip
                  
                  echo "[$(date)] Starting session backup..."
                  
                  # ── Ensure session_backup_log table ──
                  psql "$DATABASE_URL" -c "
                    CREATE TABLE IF NOT EXISTS session_backup_log (
                      session_id    VARCHAR(64) PRIMARY KEY,
                      backed_up_at  TIMESTAMPTZ NOT NULL DEFAULT NOW(),
                      r2_key_prefix TEXT NOT NULL,
                      artifact_count INT NOT NULL DEFAULT 0,
                      total_bytes   BIGINT NOT NULL DEFAULT 0
                    );
                    CREATE INDEX IF NOT EXISTS session_backup_log_backed_up_at_idx ON session_backup_log(backed_up_at);
                  "
                  
                  # ── Count eligible sessions ──
                  TOTAL=$(psql "$DATABASE_URL" -tAX -c "
                    SELECT COUNT(*)
                    FROM sessions s
                    WHERE s.status = 'completed'
                      AND s.recording_deleted = false
                      AND s.is_replay_expired = false
                      AND EXISTS (
                        SELECT 1 FROM recording_artifacts ra
                        WHERE ra.session_id = s.id
                          AND ra.kind = 'screenshots'
                          AND ra.status = 'ready'
                      )
                      AND NOT EXISTS (
                        SELECT 1 FROM session_backup_log bl
                        WHERE bl.session_id = s.id
                      )
                      AND EXISTS (
                        SELECT 1 FROM projects p
                        WHERE p.id = s.project_id AND p.deleted_at IS NULL
                      );
                  ")
                  
                  echo "[$(date)] Found ${TOTAL} sessions to back up"
                  
                  if [ "$TOTAL" -eq 0 ]; then
                    echo "✅ Nothing to back up. Exiting."
                    exit 0
                  fi
                  
                  BACKED_UP=0
                  ERRORS=0
                  TOTAL_BYTES=0
                  
                  # Disable set -e for the processing loop so transient
                  # DB/S3 errors don't kill the entire CronJob.
                  set +e
                  
                  # Process in batches of 50
                  while [ "$ERRORS" -lt 10 ]; do
                    SESSION_IDS=$(psql "$DATABASE_URL" -tAX -c "
                      SELECT s.id FROM sessions s
                      WHERE s.status = 'completed'
                        AND s.recording_deleted = false
                        AND s.is_replay_expired = false
                        AND EXISTS (
                          SELECT 1 FROM recording_artifacts ra
                          WHERE ra.session_id = s.id AND ra.kind = 'screenshots' AND ra.status = 'ready'
                        )
                        AND NOT EXISTS (
                          SELECT 1 FROM session_backup_log bl WHERE bl.session_id = s.id
                        )
                        AND EXISTS (
                          SELECT 1 FROM projects p
                          WHERE p.id = s.project_id AND p.deleted_at IS NULL
                        )
                      ORDER BY s.started_at ASC
                      LIMIT 50;
                    ")
                    
                    if [ -z "$SESSION_IDS" ]; then
                      break
                    fi
                    
                    for SID in $SESSION_IDS; do
                      echo "── Backing up: ${SID} ──"
                      
                      # Get session metadata for path
                      SMETA=$(psql "$DATABASE_URL" -tAX -c "
                        SELECT s.project_id || '|' || p.name || '|' || s.started_at::date || '|' || COALESCE(s.platform, 'unknown')
                        FROM sessions s JOIN projects p ON p.id = s.project_id
                        WHERE s.id = '${SID}';
                      " 2>/dev/null)
                      
                      if [ -z "$SMETA" ]; then
                        echo "  ⚠️  Failed to fetch metadata, skipping"
                        ERRORS=$((ERRORS + 1))
                        continue
                      fi
                      
                      PNAME=$(echo "$SMETA" | cut -d'|' -f2 | tr ' ' '-' | tr '[:upper:]' '[:lower:]')
                      SDATE=$(echo "$SMETA" | cut -d'|' -f3)
                      PLAT=$(echo "$SMETA" | cut -d'|' -f4)
                      
                      # Verify first replay file exists on Hetzner S3
                      FK=$(psql "$DATABASE_URL" -tAX -c "
                        SELECT s3_object_key FROM recording_artifacts
                        WHERE session_id = '${SID}' AND kind = 'screenshots' AND status = 'ready' LIMIT 1;
                      " 2>/dev/null)
                      
                      if [ -z "$FK" ]; then
                        echo "  ⚠️  No screenshot artifact found, skipping"
                        ERRORS=$((ERRORS + 1))
                        continue
                      fi
                      
                      if ! AWS_ACCESS_KEY_ID="$S3_SRC_ACCESS_KEY_ID" \
                           AWS_SECRET_ACCESS_KEY="$S3_SRC_SECRET_ACCESS_KEY" \
                           aws --endpoint-url "$S3_ENDPOINT" s3api head-object \
                             --bucket "$S3_BUCKET" --key "$FK" > /dev/null 2>&1; then
                        echo "  ⏭️  Replay missing on S3, skipping"
                        psql "$DATABASE_URL" -c "
                          INSERT INTO session_backup_log (session_id, r2_key_prefix, artifact_count, total_bytes)
                          VALUES ('${SID}', 'skipped:missing_replay', 0, 0)
                          ON CONFLICT (session_id) DO NOTHING;
                        " 2>/dev/null
                        BACKED_UP=$((BACKED_UP + 1))
                        continue
                      fi
                      
                      R2_PFX="backups/sessions/${PNAME}/${PLAT}/${SDATE}/${SID}"
                      
                      # Export manifest JSON
                      MANIFEST=$(psql "$DATABASE_URL" -tAX -c "
                        SELECT json_build_object(
                          'version', '1.0',
                          'exportedAt', NOW()::text,
                          'session', json_build_object(
                            'id', s.id, 'projectId', s.project_id,
                            'deviceId', s.device_id,
                            'platform', s.platform, 'appVersion', s.app_version,
                            'deviceModel', s.device_model, 'osVersion', s.os_version,
                            'sdkVersion', s.sdk_version,
                            'userDisplayId', s.user_display_id,
                            'startedAt', s.started_at::text, 'endedAt', s.ended_at::text,
                            'durationSeconds', s.duration_seconds,
                            'backgroundTimeSeconds', s.background_time_seconds,
                            'status', s.status,
                            'retentionTier', s.retention_tier,
                            'retentionDays', s.retention_days,
                            'isSampledIn', s.is_sampled_in,
                            'replayPromoted', s.replay_promoted,
                            'replayPromotedReason', s.replay_promoted_reason,
                            'replaySegmentCount', s.replay_segment_count,
                            'replayStorageBytes', s.replay_storage_bytes,
                            'geoCountry', s.geo_country, 'geoCountryCode', s.geo_country_code,
                            'geoCity', s.geo_city, 'geoRegion', s.geo_region,
                            'geoTimezone', s.geo_timezone,
                            'eventCount', COALESCE(json_array_length(s.events::json), 0),
                            'metadata', s.metadata
                          ),
                          'metrics', (
                            SELECT json_build_object(
                              'totalEvents', m.total_events,
                              'errorCount', m.error_count,
                              'touchCount', m.touch_count, 'scrollCount', m.scroll_count,
                              'gestureCount', m.gesture_count, 'inputCount', m.input_count,
                              'apiSuccessCount', m.api_success_count,
                              'apiErrorCount', m.api_error_count,
                              'apiTotalCount', m.api_total_count,
                              'apiAvgResponseMs', m.api_avg_response_ms,
                              'rageTapCount', m.rage_tap_count, 'deadTapCount', m.dead_tap_count,
                              'screensVisited', m.screens_visited,
                              'interactionScore', m.interaction_score,
                              'explorationScore', m.exploration_score,
                              'uxScore', m.ux_score,
                              'customEventCount', m.custom_event_count,
                              'crashCount', m.crash_count, 'anrCount', m.anr_count,
                              'appStartupTimeMs', m.app_startup_time_ms,
                              'networkType', m.network_type,
                              'cellularGeneration', m.cellular_generation,
                              'isConstrained', m.is_constrained,
                              'isExpensive', m.is_expensive,
                              'screenshotSegmentCount', m.screenshot_segment_count,
                              'screenshotTotalBytes', m.screenshot_total_bytes
                            ) FROM session_metrics m WHERE m.session_id = s.id
                          ),
                          'artifacts', (
                            SELECT COALESCE(json_agg(json_build_object(
                              'kind', ra.kind, 'sizeBytes', ra.size_bytes,
                              'startTime', ra.start_time, 'endTime', ra.end_time,
                              'frameCount', ra.frame_count
                            ) ORDER BY ra.start_time NULLS LAST), '[]'::json)
                            FROM recording_artifacts ra
                            WHERE ra.session_id = s.id AND ra.status = 'ready'
                          ),
                          'tags', json_build_object(
                            'hasErrors', COALESCE((SELECT m.error_count > 0 FROM session_metrics m WHERE m.session_id = s.id), false),
                            'hasCrash', COALESCE((SELECT m.crash_count > 0 FROM session_metrics m WHERE m.session_id = s.id), false),
                            'hasAnr', COALESCE((SELECT m.anr_count > 0 FROM session_metrics m WHERE m.session_id = s.id), false),
                            'hasRageTaps', COALESCE((SELECT m.rage_tap_count > 0 FROM session_metrics m WHERE m.session_id = s.id), false),
                            'hasDeadTaps', COALESCE((SELECT m.dead_tap_count > 0 FROM session_metrics m WHERE m.session_id = s.id), false),
                            'hasApiErrors', COALESCE((SELECT m.api_error_count > 0 FROM session_metrics m WHERE m.session_id = s.id), false),
                            'isPromoted', s.replay_promoted,
                            'engagementTier', CASE
                              WHEN s.duration_seconds IS NULL OR s.duration_seconds < 10 THEN 'bouncer'
                              WHEN s.duration_seconds < 60 THEN 'casual'
                              WHEN s.duration_seconds < 300 THEN 'explorer'
                              ELSE 'loyalist'
                            END,
                            'uxScoreBucket', CASE
                              WHEN COALESCE((SELECT m.ux_score FROM session_metrics m WHERE m.session_id = s.id), 0) >= 80 THEN 'excellent'
                              WHEN COALESCE((SELECT m.ux_score FROM session_metrics m WHERE m.session_id = s.id), 0) >= 60 THEN 'good'
                              WHEN COALESCE((SELECT m.ux_score FROM session_metrics m WHERE m.session_id = s.id), 0) >= 40 THEN 'fair'
                              ELSE 'poor'
                            END
                          )
                        )::text FROM sessions s WHERE s.id = '${SID}';
                      " 2>/dev/null)
                      
                      if [ -z "$MANIFEST" ]; then
                        echo "  ⚠️  Failed to build manifest, skipping"
                        ERRORS=$((ERRORS + 1))
                        continue
                      fi
                      
                      MKEY="${R2_PFX}/manifest.json.gz"
                      
                      # Upload manifest
                      echo "$MANIFEST" | gzip -9 | \
                        aws --endpoint-url "$R2_ENDPOINT" s3 cp - \
                          "s3://${R2_BUCKET}/${MKEY}" \
                          --content-type "application/json" --content-encoding "gzip" 2>&1
                      if [ $? -ne 0 ]; then
                        echo "  ❌ Manifest upload failed"; ERRORS=$((ERRORS + 1)); continue
                      fi
                      
                      # Copy replay segments from Hetzner → R2
                      ACNT=0
                      ABYTES=0
                      SEG=0
                      
                      KEYS=$(psql "$DATABASE_URL" -tAX -c "
                        SELECT s3_object_key || '|' || COALESCE(size_bytes, 0)
                        FROM recording_artifacts
                        WHERE session_id = '${SID}' AND kind = 'screenshots' AND status = 'ready'
                        ORDER BY start_time NULLS LAST;
                      " 2>/dev/null)
                      
                      if [ -z "$KEYS" ]; then
                        echo "  ⚠️  Failed to fetch artifact keys, skipping"
                        aws --endpoint-url "$R2_ENDPOINT" s3 rm "s3://${R2_BUCKET}/${MKEY}" 2>/dev/null || true
                        ERRORS=$((ERRORS + 1))
                        continue
                      fi
                      
                      for ROW in $KEYS; do
                        S3K=$(echo "$ROW" | cut -d'|' -f1)
                        SZ=$(echo "$ROW" | cut -d'|' -f2)
                        SNAME=$(printf "segment_%03d.bin" $SEG)
                        
                        # Verify segment exists
                        if ! AWS_ACCESS_KEY_ID="$S3_SRC_ACCESS_KEY_ID" \
                             AWS_SECRET_ACCESS_KEY="$S3_SRC_SECRET_ACCESS_KEY" \
                             aws --endpoint-url "$S3_ENDPOINT" s3api head-object \
                               --bucket "$S3_BUCKET" --key "$S3K" > /dev/null 2>&1; then
                          echo "  ⚠️  Segment missing: ${S3K}"
                          continue
                        fi
                        
                        AWS_ACCESS_KEY_ID="$S3_SRC_ACCESS_KEY_ID" \
                        AWS_SECRET_ACCESS_KEY="$S3_SRC_SECRET_ACCESS_KEY" \
                        aws --endpoint-url "$S3_ENDPOINT" s3 cp "s3://${S3_BUCKET}/${S3K}" - 2>/dev/null | \
                        aws --endpoint-url "$R2_ENDPOINT" s3 cp - \
                          "s3://${R2_BUCKET}/${R2_PFX}/replay/${SNAME}" 2>&1
                        if [ $? -ne 0 ]; then
                          echo "  ⚠️  Copy failed: ${S3K}"; ERRORS=$((ERRORS + 1)); continue
                        fi
                        
                        ACNT=$((ACNT + 1))
                        ABYTES=$((ABYTES + SZ))
                        SEG=$((SEG + 1))
                      done
                      
                      # Skip if no segments copied
                      if [ "$ACNT" -eq 0 ]; then
                        echo "  ⏭️  No segments copied, cleaning up"
                        aws --endpoint-url "$R2_ENDPOINT" s3 rm "s3://${R2_BUCKET}/${MKEY}" 2>/dev/null || true
                        psql "$DATABASE_URL" -c "
                          INSERT INTO session_backup_log (session_id, r2_key_prefix, artifact_count, total_bytes)
                          VALUES ('${SID}', 'skipped:no_segments', 0, 0) ON CONFLICT DO NOTHING;
                        " 2>/dev/null
                        BACKED_UP=$((BACKED_UP + 1))
                        continue
                      fi
                      
                      # Record in backup log
                      psql "$DATABASE_URL" -c "
                        INSERT INTO session_backup_log (session_id, r2_key_prefix, artifact_count, total_bytes)
                        VALUES ('${SID}', '${R2_PFX}', ${ACNT}, ${ABYTES})
                        ON CONFLICT (session_id) DO NOTHING;
                      " 2>/dev/null
                      
                      BACKED_UP=$((BACKED_UP + 1))
                      TOTAL_BYTES=$((TOTAL_BYTES + ABYTES))
                      echo "  ✅ Done (${ACNT} segments, ~$((ABYTES / 1024)) KB)"
                    done
                  done
                  
                  echo ""
                  echo "[$(date)] Session backup complete: ${BACKED_UP} sessions, ${ERRORS} errors, ~$((TOTAL_BYTES / 1024 / 1024)) MB total"
              env:
                - name: DATABASE_URL
                  valueFrom:
                    secretKeyRef:
                      name: postgres-secret
                      key: DATABASE_URL
                # Hetzner S3 (source)
                - name: S3_ENDPOINT
                  valueFrom:
                    secretKeyRef:
                      name: s3-secret
                      key: S3_ENDPOINT
                - name: S3_BUCKET
                  valueFrom:
                    secretKeyRef:
                      name: s3-secret
                      key: S3_BUCKET
                - name: S3_SRC_ACCESS_KEY_ID
                  valueFrom:
                    secretKeyRef:
                      name: s3-secret
                      key: S3_ACCESS_KEY_ID
                - name: S3_SRC_SECRET_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: s3-secret
                      key: S3_SECRET_ACCESS_KEY
                # Cloudflare R2 (destination — same secret as postgres-backup)
                - name: R2_ENDPOINT
                  valueFrom:
                    secretKeyRef:
                      name: r2-backup-secret
                      key: R2_ENDPOINT
                - name: R2_BUCKET
                  valueFrom:
                    secretKeyRef:
                      name: r2-backup-secret
                      key: R2_BUCKET
                - name: AWS_ACCESS_KEY_ID
                  valueFrom:
                    secretKeyRef:
                      name: r2-backup-secret
                      key: AWS_ACCESS_KEY_ID
                - name: AWS_SECRET_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: r2-backup-secret
                      key: AWS_SECRET_ACCESS_KEY
              resources:
                requests:
                  cpu: 50m
                  memory: 128Mi
                limits:
                  cpu: 500m
                  memory: 512Mi
