    async function correctArtifactSize(s3ObjectKey, realBytes) {
      await sql(`
        UPDATE recording_artifacts
        SET size_bytes = $1
        WHERE s3_object_key = $2
          AND (size_bytes IS NULL OR size_bytes != $1);
      `, [realBytes, s3ObjectKey]).catch(() => {});
    }

    async function maybeRepairSessionMetadata(sessionId, manifest, artifacts) {
      const s = manifest.session || {};
      const repairs = [];

      if (s.durationSeconds == null || s.durationSeconds === 0) {
        const startedAt = s.startedAt ? new Date(s.startedAt) : null;
        const explicitEndedAt = s.explicitEndedAt ? new Date(s.explicitEndedAt) : null;
        const endedAt = s.endedAt ? new Date(s.endedAt) : null;

        let bestEndMs = explicitEndedAt ? explicitEndedAt.getTime()
                      : endedAt ? endedAt.getTime() : 0;
        for (const a of artifacts) {
          if (a.endTime && Number(a.endTime) > bestEndMs) bestEndMs = Number(a.endTime);
        }

        if (startedAt && bestEndMs > startedAt.getTime()) {
          const wallClockSeconds = Math.round((bestEndMs - startedAt.getTime()) / 1000);
          const backgroundSeconds = Math.max(0, Number(s.backgroundTimeSeconds || 0));
          const duration = Math.max(1, wallClockSeconds - backgroundSeconds);

          await sql(`
            UPDATE sessions
            SET duration_seconds = $1,
                ended_at = COALESCE(ended_at, $2::timestamptz),
                updated_at = NOW()
            WHERE id = $3
              AND (duration_seconds IS NULL OR duration_seconds = 0);
          `, [duration, new Date(bestEndMs).toISOString(), sessionId]).catch(() => {});
          repairs.push(`duration=${duration}s`);
        }
      }

      if (!s.endedAt && s.startedAt) {
        let bestEndMs = 0;
        for (const a of artifacts) {
          if (a.endTime && Number(a.endTime) > bestEndMs) bestEndMs = Number(a.endTime);
        }
        if (bestEndMs > 0) {
          await sql(`
            UPDATE sessions
            SET ended_at = $1::timestamptz, updated_at = NOW()
            WHERE id = $2 AND ended_at IS NULL;
          `, [new Date(bestEndMs).toISOString(), sessionId]).catch(() => {});
          repairs.push('ended_at');
        }
      }

      const realScreenshotCount = artifacts.filter((a) => a.kind === 'screenshots').length;
      const storedCount = Number(s.replaySegmentCount || 0);
      if (realScreenshotCount !== storedCount) {
        await sql(`
          UPDATE sessions
          SET replay_segment_count = $1, updated_at = NOW()
          WHERE id = $2 AND COALESCE(replay_segment_count, 0) != $1;
        `, [realScreenshotCount, sessionId]).catch(() => {});
        repairs.push(`segments=${storedCount}->${realScreenshotCount}`);
      }

      const realStorageBytes = artifacts
        .filter((a) => a.kind === 'screenshots')
        .reduce((sum, a) => sum + (Number(a.sizeBytes) || 0), 0);
      const storedBytes = Number(s.replayStorageBytes || 0);
      if (realStorageBytes > 0 && realStorageBytes !== storedBytes) {
        await sql(`
          UPDATE sessions
          SET replay_storage_bytes = $1, updated_at = NOW()
          WHERE id = $2 AND COALESCE(replay_storage_bytes, 0) != $1;
        `, [realStorageBytes, sessionId]).catch(() => {});
        repairs.push(`storage_bytes=${storedBytes}->${realStorageBytes}`);
      }

      if (s.status === 'ready' && !s.finalizedAt) {
        await sql(`
          UPDATE sessions
          SET finalized_at = COALESCE(ended_at, NOW()), updated_at = NOW()
          WHERE id = $1 AND status = 'ready' AND finalized_at IS NULL;
        `, [sessionId]).catch(() => {});
        repairs.push('finalized_at');
      }

      if (repairs.length > 0) {
        log(`  repaired ${sessionId}: ${repairs.join(', ')}`);
      }
    }

    // =============================================================================
    // S3 / R2 Operations (native SDK — no subprocess overhead)
    // =============================================================================

    async function downloadSourceArtifact(sourceKey, outputPath, artifact) {
      const { client, bucket } = getSourceClientForArtifact(artifact);
      const resp = await client.send(new GetObjectCommand({
        Bucket: bucket,
        Key: sourceKey,
      }));
      const ws = createWriteStream(outputPath);
      await pipeline(resp.Body, ws);
    }

    async function uploadToSource(localPath, destinationKey, contentType, artifact) {
      const { client, bucket } = getSourceClientForArtifact(artifact);
      const body = createReadStream(localPath);
      await client.send(new PutObjectCommand({
        Bucket: bucket,
        Key: destinationKey,
        Body: body,
        ContentType: contentType,
      }));
    }

    async function uploadToR2(localPath, destinationKey, contentType) {
      const body = createReadStream(localPath);
      await r2Client.send(new PutObjectCommand({
        Bucket: config.r2Bucket,
        Key: destinationKey,
        Body: body,
        ContentType: contentType,
      }));
    }

    async function headR2Object(key) {
      return r2Client.send(new HeadObjectCommand({
        Bucket: config.r2Bucket,
        Key: key,
      }));
    }

    async function headSourceObject(key, artifact) {
      const { client, bucket } = getSourceClientForArtifact(artifact);
      return client.send(new HeadObjectCommand({
        Bucket: bucket,
        Key: key,
      }));
    }

    async function removeR2Prefix(prefix) {
      try {
        let continuationToken;
        do {
          const listResp = await r2Client.send(new ListObjectsV2Command({
            Bucket: config.r2Bucket,
            Prefix: prefix,
            ContinuationToken: continuationToken,
          }));

          const objects = (listResp.Contents || []).map((obj) => ({ Key: obj.Key }));
          if (objects.length > 0) {
            await r2Client.send(new DeleteObjectsCommand({
              Bucket: config.r2Bucket,
              Delete: { Objects: objects },
            }));
          }
          continuationToken = listResp.IsTruncated ? listResp.NextContinuationToken : undefined;
        } while (continuationToken);
      } catch {
        // Best-effort rollback
      }
    }

    async function scanR2Prefix(prefix) {
      const manifestKey = `${prefix}/manifest.json`;
      let continuationToken;
      let totalObjectCount = 0;
      let artifactObjectCount = 0;
      let manifestCount = 0;
      let totalBytes = 0;

      do {
        const listResp = await r2Client.send(new ListObjectsV2Command({
          Bucket: config.r2Bucket,
          Prefix: prefix,
          ContinuationToken: continuationToken,
        }));

        for (const object of listResp.Contents || []) {
          const key = object.Key || '';
          totalObjectCount += 1;
          totalBytes += Number(object.Size || 0);
          if (key === manifestKey) {
            manifestCount += 1;
          } else {
            artifactObjectCount += 1;
          }
        }

        continuationToken = listResp.IsTruncated ? listResp.NextContinuationToken : undefined;
      } while (continuationToken);

      return {
        totalObjectCount,
        artifactObjectCount,
        manifestCount,
        totalBytes,
      };
    }

    function isSourceNotFound(error) {
      const msg = (error.message || '').toLowerCase();
      const name = (error.name || '').toLowerCase();
      const code = (error.Code || error.code || '').toLowerCase();
      const httpStatus = error.$metadata?.httpStatusCode;
      return (
        httpStatus === 404 ||
        httpStatus === 403 ||
        msg.includes('not found') ||
        msg.includes('nosuchkey') ||
        msg.includes('404') ||
        msg.includes('does not exist') ||
        name === 'nosuchkey' ||
        name === 'notfound' ||
        code === 'nosuchkey' ||
        code === 'notfound'
      );
    }

    async function verifyDownload(filePath, label) {
      const { size } = await stat(filePath);
      if (size === 0) {
        throw new Error(`${label}: downloaded file is empty (0 bytes)`);
      }
      return size;
    }

    async function verifyUpload(r2Key, expectedBytes, label) {
      const head = await headR2Object(r2Key);
      const remoteSize = head.ContentLength;
      if (remoteSize !== expectedBytes) {
        throw new Error(`${label}: size mismatch after upload (expected ${expectedBytes}, R2 has ${remoteSize})`);
      }
    }

    async function verifySourceUpload(sourceKey, expectedBytes, label, artifact) {
      const head = await headSourceObject(sourceKey, artifact);
      const remoteSize = head.ContentLength;
      if (remoteSize !== expectedBytes) {
        throw new Error(`${label}: source size mismatch after repair (expected ${expectedBytes}, source has ${remoteSize})`);
      }
    }

    // =============================================================================
    // Artifact Transformations (identical logic to before)
    // =============================================================================

    async function maybeRepairLegacyHierarchyArtifact(tempPath, artifact, artifactLabel) {
      const currentBuffer = await readFile(tempPath);

      if (
        !config.repairLegacyHierarchy ||
        artifact.kind !== 'hierarchy' ||
        !artifact.s3ObjectKey.endsWith('.json.gz')
      ) {
        return { status: 'unchanged', sizeBytes: currentBuffer.length };
      }

      if (isGzipBuffer(currentBuffer)) {
        return { status: 'already_gzipped', sizeBytes: currentBuffer.length };
      }

      try {
        JSON.parse(currentBuffer.toString('utf8'));
      } catch {
        warn(`${artifactLabel}: hierarchy object ends with .json.gz but raw bytes are not valid JSON; backing up unchanged`);
        return { status: 'skipped_invalid_payload', sizeBytes: currentBuffer.length };
      }

      const repairedBuffer = gzipSync(currentBuffer, { level: 9 });
      await writeFile(tempPath, repairedBuffer);

      await withRetry(async () => {
        await uploadToSource(tempPath, artifact.s3ObjectKey, ARTIFACT_CONTENT_TYPE, artifact);
        await verifySourceUpload(artifact.s3ObjectKey, repairedBuffer.length, artifactLabel, artifact);
      }, `repair ${artifactLabel}`);

      log(`Normalized legacy hierarchy artifact in source S3: ${artifactLabel}`);
      return { status: 'recompressed_raw_json', sizeBytes: repairedBuffer.length };
    }

    async function createTarGzFromFrames(tempPath, frames, artifactLabel) {
      const framesDir = await mkdtemp(path.join(os.tmpdir(), 'session-backup-frames-'));

      try {
        const filenames = [];

        for (let index = 0; index < frames.length; index += 1) {
          const frame = frames[index];
          const filename = `frame_${String(index).padStart(4, '0')}_${frame.timestamp}.jpg`;
          await writeFile(path.join(framesDir, filename), frame.data);
          filenames.push(filename);
        }

        if (filenames.length === 0) {
          throw new Error(`${artifactLabel}: screenshot bundle contained no extractable frames`);
        }

        await runCommand('tar', ['-czf', tempPath, '-C', framesDir, ...filenames]);

        const { size } = await stat(tempPath);
        if (size === 0) {
          throw new Error(`${artifactLabel}: repacked tar.gz is empty`);
        }

        return size;
      } finally {
        await rm(framesDir, { recursive: true, force: true });
      }
    }

    async function maybeTransformScreenshotForBackup(tempPath, artifact, artifactLabel, sessionStartTime) {
      const currentBuffer = await readFile(tempPath);

      if (!config.archiveFriendlyScreenshots || artifact.kind !== 'screenshots') {
        return {
          backupFormat: 'mirrored_source',
          sizeBytes: currentBuffer.length,
          frameCount: artifact.frameCount || 0,
        };
      }

      const rawBuffer = isGzipBuffer(currentBuffer) ? gunzipSync(currentBuffer) : currentBuffer;
      const tarEntries = parseTarEntries(rawBuffer).filter((entry) => /\.jpe?g$/i.test(entry.name));

      if (tarEntries.length > 0) {
        if (isGzipBuffer(currentBuffer)) {
          return {
            backupFormat: 'already_archive_friendly_tar_gzip',
            sizeBytes: currentBuffer.length,
            frameCount: tarEntries.length,
          };
        }

        const repackedTarGz = gzipSync(rawBuffer, { level: 9 });
        await writeFile(tempPath, repackedTarGz);
        return {
          backupFormat: 'tar_gzip_from_raw_tar',
          sizeBytes: repackedTarGz.length,
          frameCount: tarEntries.length,
        };
      }

      if (!isBinaryFrameBundle(rawBuffer)) {
        warn(`${artifactLabel}: screenshot payload is not a recognized tar or binary frame bundle; backing up unchanged`);
        return {
          backupFormat: 'passthrough_unknown_screenshot_format',
          sizeBytes: currentBuffer.length,
          frameCount: artifact.frameCount || 0,
        };
      }

      const frames = parseBinaryFrames(rawBuffer, sessionStartTime);
      if (frames.length === 0) {
        warn(`${artifactLabel}: screenshot bundle looked binary but no frames could be extracted; backing up unchanged`);
        return {
          backupFormat: 'passthrough_invalid_binary_bundle',
          sizeBytes: currentBuffer.length,
          frameCount: artifact.frameCount || 0,
        };
      }

      const repackedSize = await createTarGzFromFrames(tempPath, frames, artifactLabel);
      return {
        backupFormat: 'tar_gzip_repacked_from_binary_bundle',
        sizeBytes: repackedSize,
        frameCount: frames.length,
      };
    }

    // =============================================================================
    // Single Artifact Processing
    // =============================================================================

    async function processArtifact(artifact, index, tempDir, session) {
      const tempPath = path.join(tempDir, `artifact-${index}`);
      const backupKey = `backups/${artifact.s3ObjectKey}`;
      const artifactLabel = `${session.id}/${artifact.kind}[${index}]`;

      if (!artifact.endpointResolved) {
        throw new Error(`artifact ${artifactLabel} references unknown endpoint_id ${artifact.endpointId}`);
      }

      let sourceSize;
      let backupSize;
      let repairStatus = 'unchanged';
      let backupFormat = 'mirrored_source';
      let backupFrameCount = artifact.frameCount;

      await withRetry(
        async () => {
          await downloadSourceArtifact(artifact.s3ObjectKey, tempPath, artifact);
          sourceSize = await verifyDownload(tempPath, artifactLabel);
        },
        `download ${artifactLabel}`,
        { shouldRetry: (error) => !isSourceNotFound(error) },
      );

      const repairResult = await maybeRepairLegacyHierarchyArtifact(tempPath, artifact, artifactLabel);
      sourceSize = repairResult.sizeBytes;
      repairStatus = repairResult.status;

      if (artifact.sizeBytes !== sourceSize) {
        await correctArtifactSize(artifact.s3ObjectKey, sourceSize);
      }

      const backupTransform = await maybeTransformScreenshotForBackup(
        tempPath,
        artifact,
        artifactLabel,
        session.sessionStartMs,
      );
      backupSize = backupTransform.sizeBytes;
      backupFormat = backupTransform.backupFormat;
      backupFrameCount = backupTransform.frameCount;

      await withRetry(async () => {
        await uploadToR2(tempPath, backupKey, ARTIFACT_CONTENT_TYPE);
        await verifyUpload(backupKey, backupSize, artifactLabel);
      }, `upload ${artifactLabel}`);

      await unlink(tempPath).catch(() => {});

      return {
        kind: artifact.kind,
        sourceKey: artifact.s3ObjectKey,
        backupKey,
        repairStatus,
        backupFormat,
        sourceSizeBytes: sourceSize,
        sizeBytes: backupSize,
        frameCount: backupFrameCount,
        status: 'copied',
      };
    }

    // =============================================================================
    // Session Processing — canonical backup with archive-friendly screenshots
    // =============================================================================

    function buildBackupPrefix(session) {
      return `backups/tenant/${session.teamId}/project/${session.projectId}/sessions/${session.id}`;
    }

    async function processSession(session) {
      const prefix = buildBackupPrefix(session);
      const tempDir = await mkdtemp(path.join(os.tmpdir(), 'session-backup-'));

      try {
        const artifacts = await fetchArtifacts(session.id);
        if (artifacts.length === 0) {
          throw new Error(`session ${session.id} has no ready artifacts to back up`);
        }
        const manifest = await buildManifest(session.id);
        let totalBytes = 0;
        let missingOnSource = 0;

        const backupArtifacts = [];
        const artifactWorkers = Math.min(config.artifactParallel, artifacts.length || 1);

        const artifactResults = await runPool(artifacts, artifactWorkers, async (artifact, i) => {
          try {
            const result = await processArtifact(artifact, i, tempDir, session);
            return { ok: true, result };
          } catch (error) {
            if (isSourceNotFound(error)) {
              warn(`${session.id}/${artifact.kind}[${i}]: source not found, skipping (${error.message})`);
              return {
                ok: true,
                result: {
                  kind: artifact.kind,
                  sourceKey: artifact.s3ObjectKey,
                  backupKey: `backups/${artifact.s3ObjectKey}`,
                  repairStatus: 'source_missing',
                  backupFormat: 'source_missing',
                  sourceSizeBytes: artifact.sizeBytes,
                  sizeBytes: artifact.sizeBytes,
                  frameCount: artifact.frameCount,
                  status: 'source_missing',
                },
                sourceMissing: true,
              };
            }
            return { ok: false, error, artifact, index: i };
          }
        });

        for (const ar of artifactResults) {
          if (!ar.ok) {
            const label = `${session.id}/${ar.artifact.kind}[${ar.index}]`;
            throw new Error(`artifact ${label} failed after ${config.maxRetries} attempts: ${ar.error.message}`);
          }
          backupArtifacts.push(ar.result);
          if (ar.sourceMissing) {
            missingOnSource += 1;
          } else if (ar.result.status === 'copied') {
            totalBytes += ar.result.sizeBytes;
          }
        }

        const copiedCount = backupArtifacts.filter((a) => a.status === 'copied').length;

        if (missingOnSource > 0) {
          throw new Error(
            `session ${session.id} has ${missingOnSource} artifact(s) missing on source storage; refusing to mark backup complete`,
          );
        }
        if (copiedCount !== artifacts.length) {
          throw new Error(`session ${session.id} copied ${copiedCount}/${artifacts.length} artifacts; refusing to mark backup complete`);
        }

        await maybeRepairSessionMetadata(session.id, manifest, artifacts);

        const finalManifest = await buildManifest(session.id);
        finalManifest.exportedAt = new Date().toISOString();
        finalManifest.backupArtifacts = backupArtifacts;

        const manifestPath = path.join(tempDir, 'manifest.json');
        await writeFile(manifestPath, `${JSON.stringify(finalManifest, null, 2)}\n`, 'utf8');
        await uploadToR2(manifestPath, `${prefix}/manifest.json`, MANIFEST_CONTENT_TYPE);
        const prefixScan = await scanR2Prefix(prefix);
        if (prefixScan.manifestCount !== 1) {
          throw new Error(`session ${session.id} expected exactly one manifest.json in R2, found ${prefixScan.manifestCount}`);
        }
        if (prefixScan.artifactObjectCount !== copiedCount || prefixScan.artifactObjectCount !== artifacts.length) {
          throw new Error(
            `session ${session.id} R2 artifact parity mismatch (planned=${artifacts.length}, copied=${copiedCount}, r2=${prefixScan.artifactObjectCount})`,
          );
        }

        const quality = evaluateBackupQuality({
          manifest: finalManifest,
          plannedArtifactCount: artifacts.length,
          artifactCount: copiedCount,
          actualR2ArtifactCount: prefixScan.artifactObjectCount,
          actualR2ObjectCount: prefixScan.totalObjectCount,
          manifestPresent: prefixScan.manifestCount === 1,
        });
        await insertBackupLog(session.id, prefix, copiedCount, totalBytes, artifacts.length, quality);

        return {
          ok: true,
          sessionId: session.id,
          artifactCount: copiedCount,
          missingOnSource,
          totalBytes,
          highQuality: quality.highQuality,
          attemptNumber: session.attemptNumber || 1,
        };
      } catch (error) {
        await removeR2Prefix(prefix);
        return {
          ok: false,
          sessionId: session.id,
          reason: error.message,
          attemptNumber: session.attemptNumber || 1,
        };
      } finally {
        await rm(tempDir, { recursive: true, force: true });
      }
    }

    // =============================================================================
    // Parallel Worker Pool
    // =============================================================================

    async function runPool(items, workerCount, worker) {
      const results = new Array(items.length);
      let cursor = 0;
      const actualWorkers = Math.max(1, Math.min(workerCount, items.length || 1));

      async function next() {
        while (true) {
          const index = cursor;
          cursor += 1;
          if (index >= items.length) {
            return;
          }
          results[index] = await worker(items[index], index);
        }
      }

      await Promise.all(Array.from({ length: actualWorkers }, () => next()));
      return results;
    }

    // =============================================================================
    // Main
    // =============================================================================

    async function main() {
      log(`Starting session backup (${mode}) (legacy hierarchy gzip repair + archive-friendly screenshot repack)`);
      log(`Config: maxParallel=${config.maxParallel}, artifactParallel=${config.artifactParallel}, batchSize=${config.batchSize}`);
      if (config.reprocessBackedUp) {
        warn('SESSION_BACKUP_REPROCESS_BACKED_UP is enabled; this run will revisit sessions that were already backed up');
      }
      await ensureBackupLogTable();
      if (mode === 'seed-queue') {
        try {
          await runSeedQueueMode();
        } finally {
          await pool.end().catch(() => {});
        }
        return;
      }
      const ownerId = buildRunOwnerId();
      const acquired = await tryAcquireRunLock(ownerId);
      if (!acquired) {
        log('Another session backup run is already active; skipping this run');
        return;
      }

      let cleanedUp = false;
      const heartbeat = setInterval(() => {
        refreshRunLock(ownerId).catch((error) => {
          warn(`Failed to refresh run lock: ${error.message}`);
        });
      }, config.lockHeartbeatMs);
      heartbeat.unref();

      const cleanup = async () => {
        if (cleanedUp) return;
        cleanedUp = true;
        clearInterval(heartbeat);
        await releaseOwnedQueueClaims(ownerId).catch((error) => {
          warn(`Failed to release queued backup claims: ${error.message}`);
        });
        await releaseRunLock(ownerId);
        await pool.end().catch(() => {});
      };

      const handleSignal = (signal) => {
        warn(`Received ${signal}; releasing run lock before exit`);
        cleanup()
          .catch((error) => warn(`Failed to release run lock during ${signal}: ${error.message}`))
          .finally(() => process.exit(signal === 'SIGINT' ? 130 : 143));
      };

      process.once('SIGTERM', () => handleSignal('SIGTERM'));
      process.once('SIGINT', () => handleSignal('SIGINT'));

      try {
        const cleanedCompleted = await cleanupCompletedQueueRows();
        if (cleanedCompleted > 0) {
          log(`Removed ${cleanedCompleted} completed session(s) from the backup queue`);
        }

        const cleanedZeroReady = await cleanupZeroReadyArtifactQueueRows();
        if (cleanedZeroReady > 0) {
          log(`Removed ${cleanedZeroReady} queued session(s) that no longer have ready artifacts`);
        }

        const cleanedOrphans = await cleanupOrphanedQueueRows();
        if (cleanedOrphans > 0) {
          log(`Removed ${cleanedOrphans} orphaned session(s) from the backup queue`);
        }

        const recoveredClaims = await recoverStaleQueueClaims();
        if (recoveredClaims > 0) {
          log(`Recovered ${recoveredClaims} stale queued backup claim(s)`);
        }

        let backedUp = 0;
        let errors = 0;
        let totalBytes = 0;
        let claimedBatches = 0;

        while (true) {
          const batch = await claimQueueBatch(config.batchSize, ownerId);
          if (!batch.length) {
            if (claimedBatches === 0) {
              log('No claimable queued sessions found; nothing to back up in this run');
            }
            break;
          }

          claimedBatches += 1;
          log(`Claimed ${batch.length} queued session(s) for backup`);
          const results = await runPool(batch, config.maxParallel, processSession);
          for (const result of results) {
            if (result.ok) {
              await completeQueueEntry(result.sessionId).catch((error) => {
                warn(`Failed to delete completed queue row for ${result.sessionId}: ${error.message}`);
              });
              backedUp += 1;
              totalBytes += result.totalBytes;
              const missingNote = result.missingOnSource > 0 ? `, ${result.missingOnSource} missing on source` : '';
              console.log(`  OK ${result.sessionId}: ${result.artifactCount} artifacts, ~${Math.round(result.totalBytes / 1024)} KB${missingNote}`);
            } else {
              errors += 1;
              const delaySeconds = await requeueFailedQueueEntry(
                result.sessionId,
                ownerId,
                result.reason,
                result.attemptNumber || 1,
              );
              warn(`${result.sessionId}: ${result.reason} (retry in ${delaySeconds}s, attempt ${result.attemptNumber || 1})`);
            }
          }

          await refreshRunLock(ownerId);
          log(`Progress: ${backedUp} backed up, ${errors} retried this run`);
        }

        log(`Session backup complete: ${backedUp} sessions backed up, ${errors} retried this run, ~${Math.round(totalBytes / 1024 / 1024)} MB total`);
      } finally {
        await cleanup();
      }
    }

    main().catch((error) => {
      console.error(error.stack || error.message || String(error));
      pool.end().catch(() => {});
      process.exit(1);
    });
  backup-quality.mjs: |
    #!/usr/bin/env node

    export const BACKUP_QUALITY_RULE_VERSION = 1;
    export const HIGH_QUALITY_MIN_VISUAL_DURATION_MS = 3_000;
    export const HIGH_QUALITY_MIN_SCREENSHOT_FRAMES = 3;

    const REQUIRED_ARTIFACT_KINDS = ['events', 'hierarchy', 'screenshots'];
    const SOFT_REASONS = new Set([
      'too_short',
      'low_frame_count',
    ]);
    const LOW_QUALITY_REASONS = new Set([
      'unknown_screenshot_format',
      'invalid_session_duration',
      'invalid_time_range',
    ]);

    function isPlainObject(value) {
      return Boolean(value) && typeof value === 'object' && !Array.isArray(value);
    }

    function normalizeInteger(value) {
      const parsed = Number(value);
      if (!Number.isFinite(parsed)) {
        return 0;
      }
      return Math.max(0, Math.trunc(parsed));
    }

    function collectKinds(records) {
      if (!Array.isArray(records)) {
        return [];
      }

      const kinds = new Set();
      for (const record of records) {
        if (!isPlainObject(record) || typeof record.kind !== 'string') {
          continue;
        }
        const kind = record.kind.trim();
        if (kind) {
          kinds.add(kind);
        }
      }
      return Array.from(kinds).sort();
    }

    function computeScreenshotCoverageMs(artifacts) {
      if (!Array.isArray(artifacts)) {
        return { coverageMs: 0, invalidTimeRange: true };
      }

      let minStart = Number.POSITIVE_INFINITY;
      let maxEnd = Number.NEGATIVE_INFINITY;
      let invalidTimeRange = false;

      for (const artifact of artifacts) {
        if (!isPlainObject(artifact) || artifact.kind !== 'screenshots') {
          continue;
        }

        const startTime = Number(artifact.startTime ?? 0);
        const endTime = Number(artifact.endTime ?? 0);
        if (!Number.isFinite(startTime) || !Number.isFinite(endTime) || startTime < 0 || endTime < 0 || endTime < startTime) {
          invalidTimeRange = true;
          continue;
        }
        minStart = Math.min(minStart, startTime);
        maxEnd = Math.max(maxEnd, endTime);
      }

      if (!Number.isFinite(minStart) || !Number.isFinite(maxEnd)) {
        return { coverageMs: 0, invalidTimeRange };
      }

      return {
        coverageMs: Math.max(0, maxEnd - minStart),
        invalidTimeRange,
      };
    }

    function classifyTier(reasons) {
      if (reasons.length === 0) {
        return 'high_quality';
      }

      if (reasons.every((reason) => SOFT_REASONS.has(reason))) {
        return 'usable';
      }

      if (reasons.some((reason) => LOW_QUALITY_REASONS.has(reason))) {
        return 'low_quality';
      }

      return 'broken';
    }

    export function evaluateBackupQuality({
      manifest,
      plannedArtifactCount,
      artifactCount,
      actualR2ArtifactCount,
      actualR2ObjectCount,
      manifestPresent,
    }) {
      const reasons = new Set();
      const session = isPlainObject(manifest?.session) ? manifest.session : null;
      const artifacts = Array.isArray(manifest?.artifacts) ? manifest.artifacts.filter(isPlainObject) : [];
      const backupArtifacts = Array.isArray(manifest?.backupArtifacts) ? manifest.backupArtifacts.filter(isPlainObject) : [];
      const artifactKinds = collectKinds(artifacts);
      const backupArtifactKinds = collectKinds(backupArtifacts);
      const plannedCount = normalizeInteger(plannedArtifactCount);
      const copiedCount = normalizeInteger(artifactCount);
      const r2ArtifactCount = normalizeInteger(actualR2ArtifactCount);
      const r2ObjectCount = normalizeInteger(actualR2ObjectCount);
      const manifestArtifactCount = artifacts.length;
      const backupArtifactCount = backupArtifacts.length;
      const screenshotBackupArtifacts = backupArtifacts.filter((artifact) => artifact.kind === 'screenshots');
      const hierarchyBackupArtifacts = backupArtifacts.filter((artifact) => artifact.kind === 'hierarchy');
      const totalScreenshotFrames = screenshotBackupArtifacts.reduce(
        (sum, artifact) => sum + normalizeInteger(artifact.frameCount),
        0,
      );
      const { coverageMs, invalidTimeRange } = computeScreenshotCoverageMs(artifacts);
      const sessionDurationSeconds = session == null || session.durationSeconds == null
        ? null
        : Number(session.durationSeconds);

      if (!manifestPresent) {
        reasons.add('missing_manifest');
      }
      if (!isPlainObject(manifest)) {
        reasons.add('malformed_manifest');
      }
      if (manifest != null && manifest.version !== '3.0') {
        reasons.add('malformed_manifest');
      }
      if (!session) {
        reasons.add('missing_session');
      }

      for (const kind of REQUIRED_ARTIFACT_KINDS) {
        if (!artifactKinds.includes(kind)) {
          reasons.add(`missing_${kind}`);
        }
      }

      if (plannedCount <= 0 || copiedCount <= 0 || r2ArtifactCount <= 0) {
        reasons.add('count_mismatch');
      }
      if (plannedCount !== copiedCount) {
        reasons.add('planned_vs_copied_mismatch');
      }
      if (copiedCount !== r2ArtifactCount || plannedCount !== r2ArtifactCount) {
        reasons.add('r2_artifact_count_mismatch');
      }
      if (manifestArtifactCount !== copiedCount) {
        reasons.add('manifest_artifact_count_mismatch');
      }
      if (backupArtifactCount !== copiedCount) {
        reasons.add('backup_artifact_count_mismatch');
      }
      if (r2ObjectCount < r2ArtifactCount || (manifestPresent && r2ObjectCount < r2ArtifactCount + 1)) {
        reasons.add('broken_backup_prefix');
      }

      if (backupArtifacts.some((artifact) => artifact.status !== 'copied')) {
        reasons.add('source_missing');
      }
      if (hierarchyBackupArtifacts.some((artifact) => artifact.repairStatus === 'skipped_invalid_payload')) {
        reasons.add('invalid_hierarchy_payload');
      }

      const weirdScreenshotFormats = screenshotBackupArtifacts
        .map((artifact) => artifact.backupFormat)
        .filter((format) => typeof format === 'string')
        .filter((format) => (
          format === 'passthrough_unknown_screenshot_format'
          || format === 'passthrough_invalid_binary_bundle'
          || format === 'mirrored_source'
        ));
      if (weirdScreenshotFormats.length > 0) {
        reasons.add('unknown_screenshot_format');
      }

      if (invalidTimeRange) {
        reasons.add('invalid_time_range');
      }
      if (artifactKinds.includes('screenshots') && coverageMs < HIGH_QUALITY_MIN_VISUAL_DURATION_MS) {
        reasons.add('too_short');
      }
      if (artifactKinds.includes('screenshots') && totalScreenshotFrames < HIGH_QUALITY_MIN_SCREENSHOT_FRAMES) {
        reasons.add('low_frame_count');
      }
      if (sessionDurationSeconds != null && (!Number.isFinite(sessionDurationSeconds) || sessionDurationSeconds < 0)) {
        reasons.add('invalid_session_duration');
      }

      const orderedReasons = Array.from(reasons).sort();
      const qualityTier = classifyTier(orderedReasons);

      return {
        highQuality: orderedReasons.length === 0,
        qualityTier,
        qualityRuleVersion: BACKUP_QUALITY_RULE_VERSION,
        manifestPresent: Boolean(manifestPresent),
        actualR2ArtifactCount: r2ArtifactCount,
        actualR2ObjectCount: r2ObjectCount,
        qualityReason: {
          reasons: orderedReasons,
          artifactKinds,
          backupArtifactKinds,
          plannedArtifactCount: plannedCount,
          artifactCount: copiedCount,
          actualR2ArtifactCount: r2ArtifactCount,
          actualR2ObjectCount: r2ObjectCount,
          manifestArtifactCount,
          backupArtifactCount,
          manifestPresent: Boolean(manifestPresent),
          coverageMs,
          totalScreenshotFrames,
          weirdScreenshotFormats,
        },
      };
    }
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: session-backup
  namespace: rejourney
  labels:
    app.kubernetes.io/part-of: rejourney
spec:
  schedule: "0 * * * *"
  suspend: false
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      activeDeadlineSeconds: 82800
      backoffLimit: 2
      template:
        spec:
          restartPolicy: OnFailure
          volumes:
            - name: backup-script
              configMap:
                name: session-backup-script
                defaultMode: 0555
          containers:
            - name: session-backup
              image: node:22-alpine
              command:
                - /bin/sh
                - -c
                - |
                  set -e
                  apk add --no-cache tar gzip > /dev/null 2>&1
                  mkdir -p /tmp/backup-runner
                  cp /scripts/session-backup.mjs /tmp/backup-runner/session-backup.mjs
                  cp /scripts/backup-quality.mjs /tmp/backup-runner/backup-quality.mjs
                  cd /tmp/backup-runner
                  npm init -y > /dev/null 2>&1
                  npm install --no-audit --no-fund @aws-sdk/client-s3 pg > /dev/null 2>&1
                  exec node session-backup.mjs
              volumeMounts:
                - name: backup-script
                  mountPath: /scripts
                  readOnly: true
              env:
                - name: DATABASE_URL
                  valueFrom:
                    secretKeyRef:
                      name: postgres-secret
                      key: DATABASE_URL
                - name: S3_ENDPOINT
                  valueFrom:
                    secretKeyRef:
                      name: s3-secret
                      key: S3_ENDPOINT
                - name: S3_BUCKET
                  valueFrom:
                    secretKeyRef:
                      name: s3-secret
                      key: S3_BUCKET
                - name: S3_SRC_ACCESS_KEY_ID
                  valueFrom:
                    secretKeyRef:
                      name: s3-secret
                      key: S3_ACCESS_KEY_ID
                - name: S3_SRC_SECRET_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: s3-secret
                      key: S3_SECRET_ACCESS_KEY
                - name: STORAGE_ENCRYPTION_KEY
                  valueFrom:
                    secretKeyRef:
                      name: app-secret
                      key: STORAGE_ENCRYPTION_KEY
                - name: R2_ENDPOINT
                  valueFrom:
                    secretKeyRef:
                      name: r2-backup-secret
                      key: R2_ENDPOINT
                - name: R2_BUCKET
                  valueFrom:
                    secretKeyRef:
                      name: r2-backup-secret
                      key: R2_BUCKET
                - name: AWS_ACCESS_KEY_ID
                  valueFrom:
                    secretKeyRef:
                      name: r2-backup-secret
                      key: AWS_ACCESS_KEY_ID
                - name: AWS_SECRET_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: r2-backup-secret
                      key: AWS_SECRET_ACCESS_KEY
                - name: SESSION_BACKUP_BATCH_SIZE
                  value: "40"
                - name: SESSION_BACKUP_BATCH_FETCH_SIZE
                  value: "200"
                - name: SESSION_BACKUP_MAX_PARALLEL
                  value: "4"
                - name: SESSION_BACKUP_ARTIFACT_PARALLEL
                  value: "4"
                - name: SESSION_BACKUP_REPAIR_LEGACY_HIERARCHY_GZIP
                  value: "1"
                - name: SESSION_BACKUP_ARCHIVE_FRIENDLY_SCREENSHOTS
                  value: "1"
              resources:
                requests:
                  cpu: 200m
                  memory: 768Mi
                limits:
                  cpu: "1"
                  memory: 1536Mi
---
