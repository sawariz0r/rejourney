---
# Manual ClickHouse historical import job for api_endpoint_daily_stats.
# This file is intentionally not labeled app.kubernetes.io/part-of=rejourney,
# so deploy-release.sh does not run the backfill during normal deploys.
apiVersion: batch/v1
kind: Job
metadata:
  name: clickhouse-backfill-api-stats
  namespace: rejourney
  labels:
    app.kubernetes.io/component: clickhouse-backfill
spec:
  ttlSecondsAfterFinished: 604800
  backoffLimit: 1
  template:
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      restartPolicy: OnFailure
      initContainers:
        - name: wait-postgres
          image: postgres:18-alpine
          command:
            - /bin/sh
            - -c
            - |
              echo "Waiting for PostgreSQL to be ready..."
              until pg_isready -h pgbouncer -p 5432 -U rejourney; do
                echo "PostgreSQL not ready, waiting 5s..."
                sleep 5
              done
              echo "PostgreSQL is ready."
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD
        - name: wait-clickhouse
          image: curlimages/curl:8.11.1
          command:
            - /bin/sh
            - -c
            - |
              set -eu
              url="${CLICKHOUSE_URL:-http://clickhouse-rejourney:8123}"
              echo "Waiting for ClickHouse at ${url}..."
              until curl -fsS "${url}/ping" >/dev/null; do
                echo "ClickHouse not ready, waiting 5s..."
                sleep 5
              done
              echo "ClickHouse is ready."
          env:
            - name: CLICKHOUSE_URL
              valueFrom:
                secretKeyRef:
                  name: clickhouse-secret
                  key: CLICKHOUSE_URL
                  optional: true
      containers:
        - name: backfill
          image: ghcr.io/rejourneyco/rejourney/migration:latest
          imagePullPolicy: Always
          command: ["/bin/sh", "-c"]
          args:
            - >-
              export CLICKHOUSE_URL="${CLICKHOUSE_URL:-http://clickhouse-rejourney:8123}"
              && node --import tsx scripts/backfillClickHouseApiEndpointStats.ts
          env:
            - name: NODE_ENV
              value: production
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: PGBOUNCER_URL
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: JWT_SECRET
            - name: INGEST_HMAC_SECRET
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: INGEST_HMAC_SECRET
            - name: CLICKHOUSE_ENABLED
              value: "true"
            - name: CLICKHOUSE_DUAL_WRITE_ENABLED
              value: "false"
            - name: CLICKHOUSE_READS_ENABLED
              value: "false"
            - name: CLICKHOUSE_URL
              valueFrom:
                secretKeyRef:
                  name: clickhouse-secret
                  key: CLICKHOUSE_URL
                  optional: true
            - name: CLICKHOUSE_USER
              valueFrom:
                secretKeyRef:
                  name: clickhouse-secret
                  key: CLICKHOUSE_USER
            - name: CLICKHOUSE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: clickhouse-secret
                  key: CLICKHOUSE_PASSWORD
            - name: CLICKHOUSE_DATABASE
              valueFrom:
                secretKeyRef:
                  name: clickhouse-secret
                  key: CLICKHOUSE_DATABASE
            - name: CLICKHOUSE_CUTOVER_DATE
              valueFrom:
                secretKeyRef:
                  name: clickhouse-secret
                  key: CLICKHOUSE_CUTOVER_DATE
                  optional: true
            - name: CLICKHOUSE_REQUEST_TIMEOUT_MS
              value: "30000"
            - name: CLICKHOUSE_BACKFILL_BATCH_SIZE
              value: "5000"
          resources:
            requests:
              cpu: 250m
              memory: 384Mi
            limits:
              cpu: "1"
              memory: 1Gi
