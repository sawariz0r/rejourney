---
# ClickHouse setup job. It creates the analytics projection schema after the
# operator-managed ClickHouseInstallation is ready.
apiVersion: batch/v1
kind: Job
metadata:
  name: clickhouse-setup
  namespace: rejourney
  labels:
    app.kubernetes.io/component: clickhouse
spec:
  ttlSecondsAfterFinished: 86400
  backoffLimit: 3
  template:
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      restartPolicy: OnFailure
      initContainers:
        - name: wait-clickhouse
          image: curlimages/curl:8.11.1
          command:
            - /bin/sh
            - -c
            - |
              set -eu
              url="${CLICKHOUSE_URL:-http://clickhouse-rejourney:8123}"
              echo "Waiting for ClickHouse at ${url}..."
              until curl -fsS "${url}/ping" >/dev/null; do
                echo "ClickHouse not ready, waiting 5s..."
                sleep 5
              done
              echo "ClickHouse is ready."
          env:
            - name: CLICKHOUSE_URL
              valueFrom:
                secretKeyRef:
                  name: clickhouse-secret
                  key: CLICKHOUSE_URL
                  optional: true
      containers:
        - name: setup
          image: ghcr.io/rejourneyco/rejourney/migration:latest
          imagePullPolicy: Always
          command: ["/bin/sh", "-c"]
          args:
            - >-
              export CLICKHOUSE_URL="${CLICKHOUSE_URL:-http://clickhouse-rejourney:8123}"
              && node --import tsx scripts/setupClickHouse.ts
          env:
            - name: NODE_ENV
              value: production
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: PGBOUNCER_URL
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: JWT_SECRET
            - name: INGEST_HMAC_SECRET
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: INGEST_HMAC_SECRET
            - name: CLICKHOUSE_ENABLED
              value: "true"
            - name: CLICKHOUSE_DUAL_WRITE_ENABLED
              value: "false"
            - name: CLICKHOUSE_READS_ENABLED
              value: "false"
            - name: CLICKHOUSE_CLUSTER
              value: default
            - name: CLICKHOUSE_URL
              valueFrom:
                secretKeyRef:
                  name: clickhouse-secret
                  key: CLICKHOUSE_URL
                  optional: true
            - name: CLICKHOUSE_USER
              valueFrom:
                secretKeyRef:
                  name: clickhouse-secret
                  key: CLICKHOUSE_USER
            - name: CLICKHOUSE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: clickhouse-secret
                  key: CLICKHOUSE_PASSWORD
            - name: CLICKHOUSE_DATABASE
              valueFrom:
                secretKeyRef:
                  name: clickhouse-secret
                  key: CLICKHOUSE_DATABASE
            - name: CLICKHOUSE_REQUEST_TIMEOUT_MS
              value: "30000"
