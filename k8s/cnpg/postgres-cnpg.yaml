# CloudNativePG Cluster manifest
#
# IMPORTANT: This file is applied by deploy-release.sh via an explicit
# k8s/cnpg/postgres-cnpg.yaml step after the root manifests/prereqs. We keep it
# in a subdirectory so the main root-level apply/prune pass does not touch the
# CNPG CR before the operator is installed.
#
# Prerequisites (Phase 1-D):
#   1. CNPG operator installed (kubectl apply -f cnpg-X.X.X.yaml)
#   2. cnpg-import-secret created with superuser password
#   3. postgres superuser password set on the legacy StatefulSet

apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: postgres
  namespace: rejourney
  labels:
    app.kubernetes.io/part-of: rejourney
spec:
  instances: 1   # single instance for Part 1; raise to 2 in Phase 2-B

  # Must match the existing Postgres major version.
  # Current cluster runs PostgreSQL 18.1. Verify CNPG version supports PG 18
  # before installing (CNPG 1.25 supports up to PG 17; use 1.26+ for PG 18).
  imageName: ghcr.io/cloudnative-pg/postgresql:18

  postgresql:
    parameters:
      max_connections: "60"
      shared_buffers: "1536MB"
      effective_cache_size: "4GB"
      work_mem: "16MB"
      maintenance_work_mem: "128MB"
      # CNPG automatically manages shared_preload_libraries for pg_stat_statements
      # when pg_stat_statements.* settings are present.
      pg_stat_statements.max: "10000"
      pg_stat_statements.track: "all"

  # Matches legacy StatefulSet sizing (node has 8 CPU / 16 GiB).
  # shared_buffers=1.5 GB and effective_cache_size=4 GB fit comfortably inside the 6 GiB limit.
  resources:
    requests:
      cpu: "1"
      memory: "2Gi"
    limits:
      cpu: "3"
      memory: "6Gi"

  storage:
    storageClass: hcloud-volumes
    size: 60Gi   # database is already 27.7 GB; 60 Gi gives headroom for growth

  # Plain initdb (no CNPG logical import).
  # Rationale: legacy cluster's `rejourney` role has oid=10 (bootstrap superuser from Bitnami
  # POSTGRES_USER init), which CNPG's source role query (`WHERE oid >= 16384`) silently excludes,
  # causing every `ALTER ... OWNER TO rejourney` to fail during pg_restore.
  # Instead: bootstrap empty, then pg_dump | psql from legacy manually (see Phase 1-D Step D-5).
  bootstrap:
    initdb:
      database: rejourney
      owner: rejourney
      secret:
        name: postgres-app-secret   # created before apply; provides rejourney's password

  backup:
    barmanObjectStore:
      destinationPath: s3://rejourney-backup/cnpg-wal
      s3Credentials:
        accessKeyId:
          name: r2-backup-secret
          key: AWS_ACCESS_KEY_ID      # actual key name in r2-backup-secret
        secretAccessKey:
          name: r2-backup-secret
          key: AWS_SECRET_ACCESS_KEY  # actual key name in r2-backup-secret
      endpointURL: https://bea95e0d46f34ef18361f2537571d720.eu.r2.cloudflarestorage.com
      wal:
        compression: gzip
    retentionPolicy: "30d"
