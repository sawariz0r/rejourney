# CloudNativePG Cluster manifest for the active local-storage primary.
#
# IMPORTANT: This file is applied by deploy-release.sh via an explicit
# k8s/cnpg/postgres-cnpg.yaml step after the root manifests/prereqs. We keep it
# in a subdirectory so the main root-level apply/prune pass does not touch the
# CNPG CR before the operator is installed.
#
# The bootstrap / external cluster fields are intentionally retained because the
# live `postgres-local` cluster was created via pg_basebackup from `postgres`
# during the storage cutover. Keeping the reconciled spec aligned avoids
# surprise diffs on the next CI deploy.

apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: postgres-local
  namespace: rejourney
  labels:
    app.kubernetes.io/part-of: rejourney
spec:
  instances: 1

  # Must match the existing Postgres major version.
  # Current cluster runs PostgreSQL 18.1. Verify CNPG version supports PG 18
  # before installing (CNPG 1.25 supports up to PG 17; use 1.26+ for PG 18).
  imageName: ghcr.io/cloudnative-pg/postgresql:18

  postgresql:
    parameters:
      max_connections: "60"
      shared_buffers: "4GB"
      effective_cache_size: "12GB"
      work_mem: "32MB"
      maintenance_work_mem: "512MB"
      # CNPG automatically manages shared_preload_libraries for pg_stat_statements
      # when pg_stat_statements.* settings are present.
      pg_stat_statements.max: "10000"
      pg_stat_statements.track: "all"

  resources:
    requests:
      cpu: "2"
      memory: "6Gi"
    limits:
      cpu: "5"
      memory: "10Gi"

  storage:
    storageClass: rejourney-db-local-retain
    size: 40Gi

  bootstrap:
    pg_basebackup:
      database: rejourney
      owner: rejourney
      secret:
        name: postgres-app-secret
      source: postgres

  replica:
    enabled: false
    source: postgres

  externalClusters:
    - name: postgres
      connectionParameters:
        host: postgres-rw.rejourney.svc.cluster.local
        user: streaming_replica
        dbname: postgres
        sslmode: verify-full
      sslKey:
        name: postgres-replication
        key: tls.key
      sslCert:
        name: postgres-replication
        key: tls.crt
      sslRootCert:
        name: postgres-ca
        key: ca.crt

  backup:
    barmanObjectStore:
      destinationPath: s3://rejourney-backup/cnpg-wal
      s3Credentials:
        accessKeyId:
          name: r2-backup-secret
          key: AWS_ACCESS_KEY_ID      # actual key name in r2-backup-secret
        secretAccessKey:
          name: r2-backup-secret
          key: AWS_SECRET_ACCESS_KEY  # actual key name in r2-backup-secret
      endpointURL: https://bea95e0d46f34ef18361f2537571d720.eu.r2.cloudflarestorage.com
      wal:
        compression: gzip
    retentionPolicy: "30d"
