# CoreDNS — scale to 2 replicas for DNS HA across FSN1 and HEL1
#
# PROBLEM: k3s manages CoreDNS via its internal addon mechanism, not a HelmChart CR.
# HelmChartConfig does NOT work here (no HelmChart to bind to). The only way to
# set replicas is a direct kubectl patch, which must be re-applied after k3s upgrades.
#
# APPLY (one-time or post-k3s-upgrade — cannot be automated via CI):
#   kubectl patch deployment coredns -n kube-system -p '{"spec":{"replicas":2}}'
#
# Verify:
#   kubectl get pods -n kube-system -l k8s-app=kube-dns -o wide
#   # should show 2 pods: one on fsn1, one on a HEL1 node
#
# WHY: With 1 replica (k3s default) on FSN1, a hard FSN1 failure causes 30–60s of
# cluster-wide DNS outage — all in-cluster service name resolution fails, blocking
# every reconnect from surviving pods. A second replica on HEL1 keeps DNS alive
# throughout FSN1 failover.
