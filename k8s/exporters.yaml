# Exporters - Metrics exporters for VictoriaMetrics scraping
# Replaces: NetData (system + K8s + Postgres visibility)
#
# Contains:
#   1. node-exporter  — VPS system metrics (CPU, RAM, disk, network)
#   2. cadvisor       — Per-container CPU, RAM, filesystem, network usage
#   3. kube-state-metrics — K8s object state (pods, deployments, CronJobs)
#   4. postgres-exporter  — PostgreSQL metrics (connections, queries, table sizes)
#
# NOTE: ClusterRole/ClusterRoleBinding resources here are cluster-scoped and
# intentionally omit the app.kubernetes.io/part-of=rejourney label so the
# kubectl apply --prune step in deploy-release.sh never touches them.

# ============================================================
# 1. NODE EXPORTER
# ============================================================

---
# ServiceAccount for node-exporter (cluster-scoped, no part-of label)
apiVersion: v1
kind: ServiceAccount
metadata:
  name: node-exporter
  namespace: rejourney

---
# node-exporter DaemonSet — runs on every node, mounts host paths read-only
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: node-exporter
  namespace: rejourney
  labels:
    app: node-exporter
    app.kubernetes.io/part-of: rejourney
spec:
  selector:
    matchLabels:
      app: node-exporter
  template:
    metadata:
      labels:
        app: node-exporter
    spec:
      serviceAccountName: node-exporter
      hostPID: true
      containers:
        - name: node-exporter
          image: prom/node-exporter:v1.8.2
          args:
            - --path.procfs=/host/proc
            - --path.sysfs=/host/sys
            - --path.rootfs=/host/root
            - --collector.filesystem.mount-points-exclude=^/(dev|proc|sys|var/lib/docker/.+|var/lib/kubelet/pods/.+|var/lib/rancher/k3s/.+)($$|/)
            - --web.listen-address=:9100
          ports:
            - containerPort: 9100
          securityContext:
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65534
          volumeMounts:
            - name: proc
              mountPath: /host/proc
              readOnly: true
            - name: sys
              mountPath: /host/sys
              readOnly: true
            - name: root
              mountPath: /host/root
              readOnly: true
              mountPropagation: HostToContainer
          resources:
            requests:
              cpu: 10m
              memory: 20Mi
            limits:
              cpu: 50m
              memory: 50Mi
      tolerations:
        - operator: Exists
          effect: NoSchedule
      volumes:
        - name: proc
          hostPath:
            path: /proc
        - name: sys
          hostPath:
            path: /sys
        - name: root
          hostPath:
            path: /

---
apiVersion: v1
kind: Service
metadata:
  name: node-exporter
  namespace: rejourney
  labels:
    app: node-exporter
    app.kubernetes.io/part-of: rejourney
spec:
  type: ClusterIP
  ports:
    - port: 9100
      targetPort: 9100
  selector:
    app: node-exporter

# ============================================================
# 2. CADVISOR
# ============================================================
#
# Supplies the real container CPU / memory / filesystem usage series that many
# Grafana Kubernetes dashboards expect (for example container_cpu_usage_seconds_total
# and container_memory_working_set_bytes).
#
# The current production cluster is single-node, so a ClusterIP service in front
# of the DaemonSet is sufficient for scraping. If the cluster grows beyond one
# node, switch VictoriaMetrics to pod-based service discovery for this job.

---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: cadvisor
  namespace: rejourney
  labels:
    app: cadvisor
    app.kubernetes.io/part-of: rejourney
spec:
  selector:
    matchLabels:
      app: cadvisor
  template:
    metadata:
      labels:
        app: cadvisor
    spec:
      automountServiceAccountToken: false
      containers:
        - name: cadvisor
          image: gcr.io/cadvisor/cadvisor:v0.52.1
          args:
            # k3s uses its embedded containerd socket under /run/k3s rather than
            # the upstream default /run/containerd/containerd.sock.
            - --containerd=/run/k3s/containerd/containerd.sock
            # Keep only the Kubernetes identity labels Grafana needs for
            # per-pod/container dashboards. The full cAdvisor label set is large
            # enough that VictoriaMetrics ends up retaining only the cgroup id.
            - --store_container_labels=false
            - --whitelisted_container_labels=io.kubernetes.pod.name,io.kubernetes.pod.namespace,io.kubernetes.container.name,io.kubernetes.pod.uid
          ports:
            - containerPort: 8080
              name: metrics
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          securityContext:
            privileged: true
          volumeMounts:
            - name: rootfs
              mountPath: /rootfs
              readOnly: true
            - name: var-run
              mountPath: /var/run
              readOnly: true
            - name: sys
              mountPath: /sys
              readOnly: true
            - name: kubelet
              mountPath: /var/lib/kubelet
              readOnly: true
            - name: containerd
              mountPath: /var/lib/containerd
              readOnly: true
            - name: disk
              mountPath: /dev/disk
              readOnly: true
            - name: kmsg
              mountPath: /dev/kmsg
              readOnly: true
      tolerations:
        - operator: Exists
          effect: NoSchedule
      volumes:
        - name: rootfs
          hostPath:
            path: /
        - name: var-run
          hostPath:
            path: /var/run
        - name: sys
          hostPath:
            path: /sys
        - name: kubelet
          hostPath:
            path: /var/lib/kubelet
        - name: containerd
          hostPath:
            path: /var/lib/containerd
        - name: disk
          hostPath:
            path: /dev/disk
        - name: kmsg
          hostPath:
            path: /dev/kmsg

---
apiVersion: v1
kind: Service
metadata:
  name: cadvisor
  namespace: rejourney
  labels:
    app: cadvisor
    app.kubernetes.io/part-of: rejourney
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: metrics
      name: metrics
  selector:
    app: cadvisor

# ============================================================
# 3. KUBE-STATE-METRICS
# ============================================================

---
# ServiceAccount for kube-state-metrics (no part-of label — cluster-scoped)
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kube-state-metrics
  namespace: rejourney

---
# ClusterRole — read-only access to K8s objects (no part-of label)
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kube-state-metrics
rules:
  - apiGroups: [""]
    resources:
      - configmaps
      - endpoints
      - namespaces
      - nodes
      - persistentvolumeclaims
      - persistentvolumes
      - pods
      - replicationcontrollers
      - resourcequotas
      - secrets
      - services
    verbs: ["list", "watch"]
  - apiGroups: ["apps"]
    resources:
      - daemonsets
      - deployments
      - replicasets
      - statefulsets
    verbs: ["list", "watch"]
  - apiGroups: ["batch"]
    resources:
      - cronjobs
      - jobs
    verbs: ["list", "watch"]
  - apiGroups: ["autoscaling"]
    resources:
      - horizontalpodautoscalers
    verbs: ["list", "watch"]
  - apiGroups: ["storage.k8s.io"]
    resources:
      - storageclasses
      - volumeattachments
    verbs: ["list", "watch"]

---
# ClusterRoleBinding (no part-of label)
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kube-state-metrics
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kube-state-metrics
subjects:
  - kind: ServiceAccount
    name: kube-state-metrics
    namespace: rejourney

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kube-state-metrics
  namespace: rejourney
  labels:
    app: kube-state-metrics
    app.kubernetes.io/part-of: rejourney
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kube-state-metrics
  template:
    metadata:
      labels:
        app: kube-state-metrics
    spec:
      serviceAccountName: kube-state-metrics
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        fsGroup: 65534
      containers:
        - name: kube-state-metrics
          image: registry.k8s.io/kube-state-metrics/kube-state-metrics:v2.13.0
          args:
            - --resources=cronjobs,daemonsets,deployments,jobs,namespaces,nodes,persistentvolumeclaims,pods,replicasets,services,statefulsets
            - --port=8080
            - --telemetry-port=8081
          ports:
            - containerPort: 8080
              name: metrics
            - containerPort: 8081
              name: telemetry
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
          resources:
            requests:
              cpu: 10m
              memory: 30Mi
            limits:
              cpu: 100m
              memory: 100Mi
          livenessProbe:
            httpGet:
              path: /livez
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: kube-state-metrics
  namespace: rejourney
  labels:
    app: kube-state-metrics
    app.kubernetes.io/part-of: rejourney
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: 8080
      name: metrics
  selector:
    app: kube-state-metrics

# ============================================================
# 4. POSTGRES EXPORTER
# ============================================================
# Connects read-only to PostgreSQL and exposes metrics for Grafana.
#
# IMPORTANT: Uses a dedicated postgres-exporter-secret DATA_SOURCE_NAME pointing at
# postgres-rw:5432 with a dedicated read-only `monitoring` role.
# To (re)create the monitoring role on CNPG:
#   PRIMARY=$(kubectl get pod -n rejourney -l cnpg.io/cluster=postgres,cnpg.io/instanceRole=primary -o jsonpath='{.items[0].metadata.name}')
#   kubectl exec -it "$PRIMARY" -n rejourney -c postgres -- psql -U postgres -d rejourney -c \
#     "CREATE ROLE monitoring LOGIN PASSWORD '<pw>'; \
#      GRANT pg_monitor TO monitoring; \
#      GRANT CONNECT ON DATABASE rejourney TO monitoring; \
#      GRANT USAGE ON SCHEMA public TO monitoring; \
#      GRANT SELECT ON ALL TABLES IN SCHEMA public TO monitoring; \
#      ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT SELECT ON TABLES TO monitoring;"
# Until dedicated monitoring credentials are provided, scripts/k8s/k8s-sync-secrets.sh
# mirrors the app credentials into postgres-exporter-secret so deploys remain functional.
#
# OPTIONAL (enables dashboard 9628 query stats):
#   PRIMARY=$(kubectl get pod -n rejourney -l cnpg.io/cluster=postgres,cnpg.io/instanceRole=primary -o jsonpath='{.items[0].metadata.name}')
#   kubectl exec -it "$PRIMARY" -n rejourney -c postgres -- psql -U postgres -d rejourney -c \
#     "CREATE EXTENSION IF NOT EXISTS pg_stat_statements;"
# Also add to k8s/cnpg/postgres-cnpg.yaml under spec.postgresql.parameters:
#   shared_preload_libraries: "pg_stat_statements"

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-exporter-queries
  namespace: rejourney
  labels:
    app.kubernetes.io/part-of: rejourney
data:
  queries.yaml: |
    pg_database_size:
      query: >
        SELECT datname, pg_database_size(datname) AS size_bytes
        FROM pg_database
        WHERE datistemplate = false
      metrics:
        - datname:
            usage: "LABEL"
            description: "Database name"
        - size_bytes:
            usage: "GAUGE"
            description: "Database size in bytes"

    pg_table_size:
      query: >
        SELECT schemaname, tablename,
               pg_total_relation_size(schemaname||'.'||tablename) AS total_bytes,
               pg_relation_size(schemaname||'.'||tablename) AS table_bytes,
               pg_indexes_size(schemaname||'.'||tablename) AS index_bytes
        FROM pg_tables
        WHERE schemaname = 'public'
        ORDER BY total_bytes DESC
        LIMIT 30
      metrics:
        - schemaname:
            usage: "LABEL"
        - tablename:
            usage: "LABEL"
        - total_bytes:
            usage: "GAUGE"
            description: "Total table size including indexes"
        - table_bytes:
            usage: "GAUGE"
            description: "Table data size"
        - index_bytes:
            usage: "GAUGE"
            description: "Index size"

    pg_connections:
      query: >
        SELECT state, count(*) AS count
        FROM pg_stat_activity
        WHERE datname = current_database()
        GROUP BY state
      metrics:
        - state:
            usage: "LABEL"
        - count:
            usage: "GAUGE"
            description: "Number of connections by state"

    # ----------------------------------------------------------------
    # S3 / storage observability (feeds the "Rejourney S3" dashboard)
    # ----------------------------------------------------------------
    #
    # Performance notes:
    #   recording_artifacts has 6M+ rows/week — we cap time windows at 2h/1h.
    #   Monitoring migrations add the targeted indexes these queries use:
    #     recording_artifacts_created_status_endpoint_idx
    #     recording_artifacts_pending_stalled_idx
    #     recording_artifacts_upload_completed_at_idx
    #     recording_artifacts_failed_recent_idx
    #     recording_artifacts_session_ready_endpoint_idx

    # Inventory of configured S3 endpoints — one row per (bucket, active,
    # shadow). Lets the dashboard show the full multi-bucket topology and
    # immediately reflects added/removed endpoints without any code change.
    rejourney_storage_endpoints:
      query: >
        SELECT
          bucket,
          COALESCE(region, 'unknown')    AS region,
          active::text                   AS active,
          shadow::text                   AS shadow,
          CASE WHEN project_id IS NULL THEN 'global' ELSE 'project' END AS scope,
          count(*)                       AS endpoint_count
        FROM storage_endpoints
        GROUP BY bucket, region, active, shadow, scope
      metrics:
        - bucket:
            usage: "LABEL"
        - region:
            usage: "LABEL"
        - active:
            usage: "LABEL"
        - shadow:
            usage: "LABEL"
        - scope:
            usage: "LABEL"
        - endpoint_count:
            usage: "GAUGE"
            description: "Number of storage_endpoints rows (per bucket/region/role)"

    # Per-kind, per-endpoint artifact status. The key signal for the
    # screenshot-upload drop investigation: rows where status='pending'
    # and upload_completed_at IS NULL are requests that were issued a
    # presigned URL but never observed a successful S3 write + complete.
    rejourney_recording_artifacts_by_status:
      query: >
        WITH artifact_rollup AS (
          SELECT
            ra.kind,
            ra.endpoint_id,
            ra.status,
            CASE WHEN ra.upload_completed_at IS NULL THEN 'no' ELSE 'yes' END AS completed,
            count(*)                            AS artifact_count,
            COALESCE(SUM(COALESCE(ra.size_bytes, ra.declared_size_bytes, 0)), 0)::bigint AS size_bytes_total
          FROM recording_artifacts ra
          WHERE ra.created_at > NOW() - INTERVAL '2 hours'
          GROUP BY
            ra.kind,
            ra.endpoint_id,
            ra.status,
            CASE WHEN ra.upload_completed_at IS NULL THEN 'no' ELSE 'yes' END
        )
        SELECT
          ar.kind,
          COALESCE(ar.endpoint_id, 'unknown') AS endpoint_id,
          COALESCE(se.bucket, 'unknown')      AS bucket,
          COALESCE(se.region, 'unknown')      AS region,
          CASE
            WHEN se.id IS NULL THEN 'unknown'
            WHEN se.project_id IS NULL THEN 'global'
            ELSE 'project'
          END                                 AS scope,
          CASE
            WHEN se.active IS TRUE THEN 'true'
            WHEN se.active IS FALSE THEN 'false'
            ELSE 'unknown'
          END                                 AS active,
          CASE
            WHEN se.shadow IS TRUE THEN 'true'
            WHEN se.shadow IS FALSE THEN 'false'
            ELSE 'unknown'
          END                                 AS shadow,
          ar.status,
          ar.completed,
          ar.artifact_count,
          ar.size_bytes_total
        FROM artifact_rollup ar
        LEFT JOIN storage_endpoints se ON se.id::text = ar.endpoint_id
      metrics:
        - kind:
            usage: "LABEL"
        - endpoint_id:
            usage: "LABEL"
        - bucket:
            usage: "LABEL"
        - region:
            usage: "LABEL"
        - scope:
            usage: "LABEL"
        - active:
            usage: "LABEL"
        - shadow:
            usage: "LABEL"
        - status:
            usage: "LABEL"
        - completed:
            usage: "LABEL"
        - artifact_count:
            usage: "GAUGE"
            description: "Recording artifacts (7d window) by kind/endpoint/status/completed"
        - size_bytes_total:
            usage: "GAUGE"
            description: "Sum of size_bytes for the same grouping"

    # Stalled pending artifacts — the primary diagnostic metric for the
    # "session replay screenshots not reaching S3" bug. An artifact is
    # stalled if it has been pending + upload_completed_at IS NULL for
    # longer than the grace window (15 min). Events/hierarchy should be
    # near zero; screenshots stuck here = uploads disappearing.
    rejourney_artifacts_stalled:
      query: >
        WITH stalled AS (
          SELECT
            ra.kind,
            ra.endpoint_id,
            count(*)                            AS stalled_count,
            COALESCE(
              EXTRACT(EPOCH FROM (NOW() - MIN(ra.created_at)))::bigint,
              0
            )                                   AS oldest_age_seconds
          FROM recording_artifacts ra
          WHERE ra.status = 'pending'
            AND ra.upload_completed_at IS NULL
            AND ra.created_at < NOW() - INTERVAL '15 minutes'
          GROUP BY ra.kind, ra.endpoint_id
        )
        SELECT
          stalled.kind,
          COALESCE(stalled.endpoint_id, 'unknown') AS endpoint_id,
          COALESCE(se.bucket, 'unknown')      AS bucket,
          COALESCE(se.region, 'unknown')      AS region,
          CASE
            WHEN se.id IS NULL THEN 'unknown'
            WHEN se.project_id IS NULL THEN 'global'
            ELSE 'project'
          END                                 AS scope,
          stalled.stalled_count,
          stalled.oldest_age_seconds
        FROM stalled
        LEFT JOIN storage_endpoints se ON se.id::text = stalled.endpoint_id
      metrics:
        - kind:
            usage: "LABEL"
        - endpoint_id:
            usage: "LABEL"
        - bucket:
            usage: "LABEL"
        - region:
            usage: "LABEL"
        - scope:
            usage: "LABEL"
        - stalled_count:
            usage: "GAUGE"
            description: "Pending artifacts older than 15m with no upload completion"
        - oldest_age_seconds:
            usage: "GAUGE"
            description: "Age of the oldest stalled pending artifact (seconds)"

    # Presign/preparation volume entering the upload relay. Compare this
    # to rejourney_artifacts_completed_recent_* to spot "issued URLs but
    # the bytes never made it to S3" gaps, especially for screenshots.
    rejourney_artifacts_created_recent:
      query: >
        SELECT
          ra.kind,
          COALESCE(ra.endpoint_id, 'unknown') AS endpoint_id,
          COALESCE(se.bucket, 'unknown')      AS bucket,
          COALESCE(se.region, 'unknown')      AS region,
          CASE
            WHEN se.id IS NULL THEN 'unknown'
            WHEN se.project_id IS NULL THEN 'global'
            ELSE 'project'
          END                                 AS scope,
          count(*)                            AS created_count,
          COALESCE(SUM(COALESCE(ra.declared_size_bytes, ra.size_bytes, 0)), 0)::bigint AS created_bytes
        FROM recording_artifacts ra
        LEFT JOIN storage_endpoints se ON se.id::text = ra.endpoint_id
        WHERE ra.created_at > NOW() - INTERVAL '1 hour'
        GROUP BY ra.kind, endpoint_id, bucket, region, scope
      metrics:
        - kind:
            usage: "LABEL"
        - endpoint_id:
            usage: "LABEL"
        - bucket:
            usage: "LABEL"
        - region:
            usage: "LABEL"
        - scope:
            usage: "LABEL"
        - created_count:
            usage: "GAUGE"
            description: "Artifacts prepared for upload in the last hour"
        - created_bytes:
            usage: "GAUGE"
            description: "Declared bytes prepared for upload in the last hour"

    # Rolling hourly artifact throughput to S3 — 'completed' = S3 write
    # confirmed by the ingest complete handler. Split by kind so the
    # dashboard can A/B compare screenshots vs events vs hierarchy.
    rejourney_artifacts_completed_recent:
      query: >
        SELECT
          ra.kind,
          COALESCE(ra.endpoint_id, 'unknown') AS endpoint_id,
          COALESCE(se.bucket, 'unknown')      AS bucket,
          COALESCE(se.region, 'unknown')      AS region,
          CASE
            WHEN se.id IS NULL THEN 'unknown'
            WHEN se.project_id IS NULL THEN 'global'
            ELSE 'project'
          END                                 AS scope,
          count(*)                            AS completed_count,
          COALESCE(SUM(COALESCE(ra.size_bytes, ra.declared_size_bytes, 0)), 0)::bigint AS completed_bytes
        FROM recording_artifacts ra
        LEFT JOIN storage_endpoints se ON se.id::text = ra.endpoint_id
        WHERE ra.upload_completed_at IS NOT NULL
          AND ra.upload_completed_at > NOW() - INTERVAL '1 hour'
        GROUP BY ra.kind, endpoint_id, bucket, region, scope
      metrics:
        - kind:
            usage: "LABEL"
        - endpoint_id:
            usage: "LABEL"
        - bucket:
            usage: "LABEL"
        - region:
            usage: "LABEL"
        - scope:
            usage: "LABEL"
        - completed_count:
            usage: "GAUGE"
            description: "Artifacts completed to S3 in the last hour"
        - completed_bytes:
            usage: "GAUGE"
            description: "Bytes completed to S3 in the last hour"

    # Ingest-job queue depth split by kind + status. The replay path
    # (screenshots + hierarchy) has its own per-kind pending counter.
    rejourney_ingest_jobs_by_status:
      query: >
        SELECT
          COALESCE(ij.kind, 'unknown') AS kind,
          ij.status,
          count(*)                     AS job_count
        FROM ingest_jobs ij
        WHERE ij.created_at > NOW() - INTERVAL '24 hours'
        GROUP BY 1, 2
      metrics:
        - kind:
            usage: "LABEL"
        - status:
            usage: "LABEL"
        - job_count:
            usage: "GAUGE"
            description: "ingest_jobs rows (24h window) grouped by kind and status"

    # Session backup worker (in-cluster retentionWorker backs sessions up
    # before deletion). These expose backup throughput, total footprint
    # backed up, and a freshness signal for alerting.
    rejourney_session_backup_totals:
      query: >
        SELECT
          COALESCE(quality_tier, 'unknown') AS quality_tier,
          count(*)                          AS sessions_backed_up,
          COALESCE(SUM(total_bytes), 0)::bigint AS bytes_backed_up
        FROM session_backup_log
        GROUP BY quality_tier
      metrics:
        - quality_tier:
            usage: "LABEL"
        - sessions_backed_up:
            usage: "GAUGE"
            description: "Sessions ever backed up (cumulative, per quality tier)"
        - bytes_backed_up:
            usage: "GAUGE"
            description: "Bytes ever backed up (cumulative, per quality tier)"

    rejourney_session_backup_recent:
      query: >
        SELECT
          COUNT(*) FILTER (
            WHERE backed_up_at > NOW() - INTERVAL '1 hour'
          )                                    AS sessions_backed_up_1h,
          COALESCE(
            SUM(total_bytes) FILTER (
              WHERE backed_up_at > NOW() - INTERVAL '1 hour'
            ),
            0
          )::bigint                            AS bytes_backed_up_1h,
          COALESCE(
            CASE
              WHEN MAX(backed_up_at) IS NULL THEN 2147483647
              ELSE EXTRACT(EPOCH FROM (NOW() - MAX(backed_up_at)))::bigint
            END,
            2147483647
          )                                    AS seconds_since_last_backup
        FROM session_backup_log
      metrics:
        - sessions_backed_up_1h:
            usage: "GAUGE"
            description: "Sessions backed up in the last hour"
        - bytes_backed_up_1h:
            usage: "GAUGE"
            description: "Bytes backed up in the last hour"
        - seconds_since_last_backup:
            usage: "GAUGE"
            description: "Seconds since the most recent successful backup (large sentinel when no backup exists yet)"

    rejourney_session_backup_queue:
      query: >
        SELECT
          status,
          count(*)                                                AS queued,
          COALESCE(MAX(attempts), 0)                              AS max_attempts,
          COALESCE(
            EXTRACT(EPOCH FROM (
              NOW() - MIN(COALESCE(next_retry_at, claimed_at, created_at))
            ))::bigint,
            0
          )                                                       AS oldest_age_seconds
        FROM session_backup_queue
        GROUP BY status
      metrics:
        - status:
            usage: "LABEL"
        - queued:
            usage: "GAUGE"
            description: "Sessions currently in the backup queue (by status)"
        - max_attempts:
            usage: "GAUGE"
            description: "Highest retry count of any queued row (catches stuck backups)"
        - oldest_age_seconds:
            usage: "GAUGE"
            description: "Age of the oldest queued row, in seconds"

    # Which live source buckets recent successful backups actually read
    # from. This is the clearest signal that the backup job is handling
    # multiple main buckets correctly while still writing into one R2
    # backup bucket.
    rejourney_session_backup_source_buckets_recent:
      query: >
        WITH recent_backups AS (
          SELECT session_id
          FROM session_backup_log
          WHERE backed_up_at > NOW() - INTERVAL '24 hours'
        ),
        artifact_rollup AS (
          SELECT
            ra.session_id,
            ra.endpoint_id,
            COUNT(*) AS ready_artifact_count_24h,
            COALESCE(
              SUM(COALESCE(ra.size_bytes, ra.declared_size_bytes, 0)),
              0
            )::bigint AS source_bytes_24h
          FROM recording_artifacts ra
          INNER JOIN recent_backups rb ON rb.session_id = ra.session_id
          WHERE ra.status = 'ready'
          GROUP BY ra.session_id, ra.endpoint_id
        )
        SELECT
          COALESCE(
            se.bucket,
            CASE
              WHEN ar.endpoint_id IS NULL THEN 'default-configured'
              ELSE 'unknown'
            END
          )                                                       AS source_bucket,
          COALESCE(se.region, 'unknown')                          AS source_region,
          CASE
            WHEN ar.endpoint_id IS NULL THEN 'legacy_or_default'
            WHEN se.project_id IS NULL THEN 'global'
            ELSE 'project'
          END                                                     AS source_scope,
          COUNT(DISTINCT ar.session_id)                           AS sessions_backed_up_24h,
          COALESCE(SUM(ar.ready_artifact_count_24h), 0)::bigint  AS ready_artifact_count_24h,
          COALESCE(SUM(ar.source_bytes_24h), 0)::bigint          AS source_bytes_24h
        FROM artifact_rollup ar
        LEFT JOIN storage_endpoints se ON se.id::text = ar.endpoint_id
        GROUP BY source_bucket, source_region, source_scope
      metrics:
        - source_bucket:
            usage: "LABEL"
        - source_region:
            usage: "LABEL"
        - source_scope:
            usage: "LABEL"
        - sessions_backed_up_24h:
            usage: "GAUGE"
            description: "Distinct sessions backed up in the last 24h that sourced artifacts from this live bucket"
        - ready_artifact_count_24h:
            usage: "GAUGE"
            description: "Ready artifacts copied in the last 24h from this live bucket"
        - source_bytes_24h:
            usage: "GAUGE"
            description: "Live-source bytes copied in the last 24h from this bucket into R2"

    # Backup integrity signals for the R2 copy. These catch cases where
    # the backup queue is draining but the copied artifact count, manifest
    # presence, or R2 parity still look wrong.
    rejourney_session_backup_integrity_recent:
      query: >
        SELECT
          COUNT(*) FILTER (
            WHERE backed_up_at > NOW() - INTERVAL '7 days'
              AND COALESCE(high_quality, false) IS NOT TRUE
          )                                                       AS low_quality_count_7d,
          COUNT(*) FILTER (
            WHERE backed_up_at > NOW() - INTERVAL '7 days'
              AND manifest_present IS DISTINCT FROM TRUE
          )                                                       AS manifest_missing_count_7d,
          COUNT(*) FILTER (
            WHERE backed_up_at > NOW() - INTERVAL '7 days'
              AND planned_artifact_count <> artifact_count
          )                                                       AS copied_plan_mismatch_count_7d,
          COUNT(*) FILTER (
            WHERE backed_up_at > NOW() - INTERVAL '7 days'
              AND COALESCE(actual_r2_artifact_count, -1) <> artifact_count
          )                                                       AS r2_parity_mismatch_count_7d
        FROM session_backup_log
      metrics:
        - low_quality_count_7d:
            usage: "GAUGE"
            description: "Backups in the last 7d that were not high_quality"
        - manifest_missing_count_7d:
            usage: "GAUGE"
            description: "Backups in the last 7d with manifest_present != true"
        - copied_plan_mismatch_count_7d:
            usage: "GAUGE"
            description: "Backups in the last 7d where copied artifact count != planned"
        - r2_parity_mismatch_count_7d:
            usage: "GAUGE"
            description: "Backups in the last 7d where actual_r2_artifact_count != copied artifact count"

    rejourney_session_backup_integrity_breakdown:
      query: >
        SELECT
          COALESCE(quality_tier, 'unknown') AS quality_tier,
          CASE
            WHEN high_quality IS TRUE THEN 'yes'
            WHEN high_quality IS FALSE THEN 'no'
            ELSE 'unknown'
          END                               AS high_quality,
          CASE
            WHEN manifest_present IS TRUE THEN 'yes'
            WHEN manifest_present IS FALSE THEN 'no'
            ELSE 'unknown'
          END                               AS manifest_present,
          CASE
            WHEN planned_artifact_count = artifact_count THEN 'yes'
            ELSE 'no'
          END                               AS copied_matches_plan,
          CASE
            WHEN COALESCE(actual_r2_artifact_count, -1) = artifact_count THEN 'yes'
            ELSE 'no'
          END                               AS r2_matches_copied,
          count(*)                          AS session_count,
          COALESCE(SUM(total_bytes), 0)::bigint AS total_bytes
        FROM session_backup_log
        WHERE backed_up_at > NOW() - INTERVAL '7 days'
        GROUP BY
          quality_tier,
          high_quality,
          manifest_present,
          copied_matches_plan,
          r2_matches_copied
      metrics:
        - quality_tier:
            usage: "LABEL"
        - high_quality:
            usage: "LABEL"
        - manifest_present:
            usage: "LABEL"
        - copied_matches_plan:
            usage: "LABEL"
        - r2_matches_copied:
            usage: "LABEL"
        - session_count:
            usage: "GAUGE"
            description: "Backups in the last 7d grouped by quality and parity flags"
        - total_bytes:
            usage: "GAUGE"
            description: "Bytes represented by the same 7d backup integrity grouping"

    # Retention activity from the audit table. This shows whether the
    # S3 purge path is deleting real objects, hitting storage-missing
    # repair cases, or failing outright.
    rejourney_retention_recent_summary:
      query: >
        SELECT
          COUNT(*) FILTER (
            WHERE started_at > NOW() - INTERVAL '24 hours'
              AND status = 'failed'
          )                                                       AS failed_purge_entries_24h,
          COUNT(*) FILTER (
            WHERE started_at > NOW() - INTERVAL '24 hours'
              AND storage_missing
          )                                                       AS storage_missing_entries_24h,
          COALESCE(
            SUM(deleted_object_count) FILTER (
              WHERE started_at > NOW() - INTERVAL '24 hours'
                AND status = 'completed'
            ),
            0
          )::bigint                                               AS deleted_objects_24h,
          COALESCE(
            SUM(deleted_bytes) FILTER (
              WHERE started_at > NOW() - INTERVAL '24 hours'
                AND status = 'completed'
            ),
            0
          )::bigint                                               AS deleted_bytes_24h,
          COALESCE(
            CASE
              WHEN MAX(finished_at) FILTER (WHERE status = 'completed') IS NULL THEN 2147483647
              ELSE EXTRACT(EPOCH FROM (
                NOW() - MAX(finished_at) FILTER (WHERE status = 'completed')
              ))::bigint
            END,
            2147483647
          )                                                       AS seconds_since_last_completed_purge
        FROM retention_deletion_log
      metrics:
        - failed_purge_entries_24h:
            usage: "GAUGE"
            description: "Failed retention_deletion_log entries in the last 24h"
        - storage_missing_entries_24h:
            usage: "GAUGE"
            description: "Retention entries in the last 24h where canonical storage was already missing"
        - deleted_objects_24h:
            usage: "GAUGE"
            description: "Objects deleted by completed retention entries in the last 24h"
        - deleted_bytes_24h:
            usage: "GAUGE"
            description: "Bytes deleted by completed retention entries in the last 24h"
        - seconds_since_last_completed_purge:
            usage: "GAUGE"
            description: "Seconds since the most recent completed retention purge entry"

    rejourney_retention_activity_recent:
      query: >
        SELECT
          status,
          scope,
          CASE WHEN storage_missing THEN 'yes' ELSE 'no' END AS storage_missing,
          count(*)                                           AS entry_count,
          COALESCE(SUM(deleted_object_count), 0)::bigint     AS deleted_objects,
          COALESCE(SUM(deleted_bytes), 0)::bigint            AS deleted_bytes
        FROM retention_deletion_log
        WHERE started_at > NOW() - INTERVAL '24 hours'
        GROUP BY status, scope, storage_missing
      metrics:
        - status:
            usage: "LABEL"
        - scope:
            usage: "LABEL"
        - storage_missing:
            usage: "LABEL"
        - entry_count:
            usage: "GAUGE"
            description: "Retention audit entries in the last 24h by status/scope/storage_missing"
        - deleted_objects:
            usage: "GAUGE"
            description: "Objects deleted by the same retention grouping in the last 24h"
        - deleted_bytes:
            usage: "GAUGE"
            description: "Bytes deleted by the same retention grouping in the last 24h"

    rejourney_retention_endpoint_activity_recent:
      query: >
        SELECT
          COALESCE(endpoint_result ->> 'bucket', 'unknown')       AS bucket,
          COALESCE(endpoint_result ->> 'endpointId', 'unknown')   AS endpoint_id,
          COALESCE(endpoint_result ->> 'endpointUrl', 'unknown')  AS endpoint_url,
          CASE
            WHEN endpoint_result ->> 'shadow' = 'true' THEN 'true'
            ELSE 'false'
          END                                                     AS shadow,
          CASE
            WHEN endpoint_result ->> 'active' = 'true' THEN 'true'
            ELSE 'false'
          END                                                     AS active,
          rdl.status,
          COUNT(*)                                                AS entry_count,
          COALESCE(
            SUM(COALESCE((endpoint_result ->> 'deletedObjectCount')::bigint, 0)),
            0
          )::bigint                                               AS deleted_objects,
          COALESCE(
            SUM(COALESCE((endpoint_result ->> 'deletedBytes')::bigint, 0)),
            0
          )::bigint                                               AS deleted_bytes
        FROM retention_deletion_log rdl
        CROSS JOIN LATERAL jsonb_array_elements(
          COALESCE(rdl.details -> 'endpointResults', '[]'::jsonb)
        ) AS endpoint_result
        WHERE rdl.started_at > NOW() - INTERVAL '24 hours'
        GROUP BY bucket, endpoint_id, endpoint_url, shadow, active, rdl.status
      metrics:
        - bucket:
            usage: "LABEL"
        - endpoint_id:
            usage: "LABEL"
        - endpoint_url:
            usage: "LABEL"
        - shadow:
            usage: "LABEL"
        - active:
            usage: "LABEL"
        - status:
            usage: "LABEL"
        - entry_count:
            usage: "GAUGE"
            description: "Retention endpoint activity rows in the last 24h"
        - deleted_objects:
            usage: "GAUGE"
            description: "Objects deleted from this live bucket/endpoint in the last 24h"
        - deleted_bytes:
            usage: "GAUGE"
            description: "Bytes deleted from this live bucket/endpoint in the last 24h"

    # ----------------------------------------------------------------
    # Upload failure diagnostics (feeds panels 212 on the S3 dashboard)
    # ----------------------------------------------------------------
    # Counts explicitly abandoned/failed artifacts in the last 2h.
    # Cross-reference with Traefik 503 (S3 write failure) vs 499 (client
    # aborted) to separate S3-provider failures from client-side issues.
    # Uses recording_artifacts_failed_recent_idx.
    rejourney_artifacts_failed_recent:
      query: >
        WITH artifact_rollup AS (
          SELECT
            ra.kind,
            ra.status,
            ra.endpoint_id,
            count(*)                        AS artifact_count,
            COALESCE(SUM(COALESCE(ra.declared_size_bytes, 0)), 0)::bigint AS declared_bytes
          FROM recording_artifacts ra
          WHERE ra.status IN ('abandoned', 'failed')
            AND ra.created_at > NOW() - INTERVAL '2 hours'
          GROUP BY ra.kind, ra.status, ra.endpoint_id
        )
        SELECT
          ar.kind,
          ar.status,
          COALESCE(se.bucket, 'unknown')  AS bucket,
          COALESCE(se.region, 'unknown')  AS region,
          ar.artifact_count,
          ar.declared_bytes
        FROM artifact_rollup ar
        LEFT JOIN storage_endpoints se ON se.id::text = ar.endpoint_id
      metrics:
        - kind:
            usage: "LABEL"
        - status:
            usage: "LABEL"
            description: "'abandoned'=S3 write failed or client aborted; 'failed'=rare re-interrupt on already-uploaded artifact"
        - bucket:
            usage: "LABEL"
        - region:
            usage: "LABEL"
        - artifact_count:
            usage: "GAUGE"
            description: "Artifacts that failed or were abandoned (2h window)"
        - declared_bytes:
            usage: "GAUGE"
            description: "Total declared bytes of failed/abandoned artifacts in 2h window"

    # Upload completion latency (feeds panel 213 on the S3 dashboard).
    # Measures time from presign-issued to S3-write-confirmed for artifacts
    # that completed in the last 1h. High P95/P99 for screenshots vs events
    # indicates S3 is slow for that content type.
    # Uses recording_artifacts_upload_completed_at_idx.
    rejourney_artifacts_upload_latency_recent:
      query: >
        WITH completed AS (
          SELECT
            ra.kind,
            ra.endpoint_id,
            count(*)                        AS completed_count,
            ROUND(PERCENTILE_CONT(0.50) WITHIN GROUP (
              ORDER BY EXTRACT(EPOCH FROM (ra.upload_completed_at - ra.created_at))
            )::numeric, 3) AS p50_seconds,
            ROUND(PERCENTILE_CONT(0.95) WITHIN GROUP (
              ORDER BY EXTRACT(EPOCH FROM (ra.upload_completed_at - ra.created_at))
            )::numeric, 3) AS p95_seconds,
            ROUND(PERCENTILE_CONT(0.99) WITHIN GROUP (
              ORDER BY EXTRACT(EPOCH FROM (ra.upload_completed_at - ra.created_at))
            )::numeric, 3) AS p99_seconds,
            ROUND(MAX(EXTRACT(EPOCH FROM (ra.upload_completed_at - ra.created_at)))::numeric, 3) AS max_seconds
          FROM recording_artifacts ra
          WHERE ra.upload_completed_at IS NOT NULL
            AND ra.upload_completed_at > NOW() - INTERVAL '1 hour'
          GROUP BY ra.kind, ra.endpoint_id
        )
        SELECT
          completed.kind,
          COALESCE(se.bucket, 'unknown')  AS bucket,
          COALESCE(se.region, 'unknown')  AS region,
          completed.completed_count,
          completed.p50_seconds,
          completed.p95_seconds,
          completed.p99_seconds,
          completed.max_seconds
        FROM completed
        LEFT JOIN storage_endpoints se ON se.id::text = completed.endpoint_id
      metrics:
        - kind:
            usage: "LABEL"
        - bucket:
            usage: "LABEL"
        - region:
            usage: "LABEL"
        - completed_count:
            usage: "GAUGE"
            description: "Artifacts that completed upload in the last 1h"
        - p50_seconds:
            usage: "GAUGE"
            description: "Median time from presign issued to S3 write confirmed (seconds)"
        - p95_seconds:
            usage: "GAUGE"
            description: "P95 presign-to-S3-confirmed latency (seconds)"
        - p99_seconds:
            usage: "GAUGE"
            description: "P99 presign-to-S3-confirmed latency (seconds)"
        - max_seconds:
            usage: "GAUGE"
            description: "Worst-case presign-to-S3-confirmed latency (seconds)"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-exporter
  namespace: rejourney
  labels:
    app: postgres-exporter
    app.kubernetes.io/part-of: rejourney
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres-exporter
  template:
    metadata:
      labels:
        app: postgres-exporter
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: postgres-exporter
          image: prometheuscommunity/postgres-exporter:v0.16.0
          env:
            - name: DATA_SOURCE_NAME
              valueFrom:
                secretKeyRef:
                  name: postgres-exporter-secret
                  key: DATA_SOURCE_NAME
            - name: PGSSLMODE
              value: "disable"
            - name: PG_EXPORTER_EXTEND_QUERY_PATH
              value: "/etc/postgres-exporter/queries.yaml"
            - name: PG_EXPORTER_AUTO_DISCOVER_DATABASES
              value: "false"
          ports:
            - containerPort: 9187
          volumeMounts:
            - name: queries
              mountPath: /etc/postgres-exporter
          resources:
            requests:
              cpu: 10m
              memory: 20Mi
            limits:
              cpu: 50m
              memory: 50Mi
          livenessProbe:
            httpGet:
              path: /
              port: 9187
            initialDelaySeconds: 10
            periodSeconds: 30
      volumes:
        - name: queries
          configMap:
            name: postgres-exporter-queries

---
apiVersion: v1
kind: Service
metadata:
  name: postgres-exporter
  namespace: rejourney
  labels:
    app: postgres-exporter
    app.kubernetes.io/part-of: rejourney
spec:
  type: ClusterIP
  ports:
    - port: 9187
      targetPort: 9187
  selector:
    app: postgres-exporter
