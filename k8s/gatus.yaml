# Gatus - Endpoint health monitoring and status page
# Replaces: Uptime Kuma (HTTP health checks, SSL cert monitoring)
# Access: kubectl -n rejourney port-forward svc/gatus 8090:8080
#         http://127.0.0.1:8090
#
# Note: Worker heartbeats are handled by Pushgateway (pushgateway.yaml), not Gatus.
# Gatus covers: HTTP endpoint health, SSL cert expiry, PostgreSQL/Redis TCP connectivity.

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: gatus-data
  namespace: rejourney
  labels:
    app.kubernetes.io/part-of: rejourney
spec:
  storageClassName: local-path
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 500Mi

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: gatus-config
  namespace: rejourney
  labels:
    app.kubernetes.io/part-of: rejourney
data:
  config.yaml: |
    storage:
      type: sqlite
      path: /data/gatus.db

    web:
      port: 8080

    ui:
      title: Rejourney Health
      header: Rejourney — Production Health

    # Endpoints are grouped so the status page sorts them logically.
    # Response-time thresholds reflect the workload of each tier:
    #   api-ingest: SDK traffic, p99 ~ 300ms — alert at 1500ms
    #   api-dashboard: operator UI reads, p99 ~ 500ms — alert at 2500ms
    #   ingest-upload: relay path with Redis buffering — alert at 1000ms
    # The `<` condition is a hard failure (red). For warnings (yellow) we use
    # Gatus' two-line condition trick: first checks for healthy, second is
    # advisory. Keep checks pessimistic enough to catch real regressions but
    # not so tight that normal load tail latency pages.

    endpoints:

      # ── Public Edge ────────────────────────────────────────────────────
      # External availability through Cloudflare → Traefik → backend.
      # Note: Cloudflare serves a bot challenge (HTTP 403) to cluster-egress
      # IPs, so we accept 200 OR 403 — both prove Cloudflare is up. Real
      # browser users never see the 403. True backend health is covered by
      # the in-cluster api-ingest / api-dashboard checks below.

      - name: Edge — api.rejourney.co
        group: Public Edge
        url: https://api.rejourney.co/health
        interval: 1m
        conditions:
          - "[STATUS] == any(200, 403)"
          - "[RESPONSE_TIME] < 3000"

      - name: Edge — ingest.rejourney.co
        group: Public Edge
        url: https://ingest.rejourney.co/health
        interval: 1m
        conditions:
          - "[STATUS] == any(200, 403)"
          - "[RESPONSE_TIME] < 3000"

      - name: Edge — rejourney.co (dashboard SPA)
        group: Public Edge
        url: https://rejourney.co
        interval: 1m
        conditions:
          - "[STATUS] == any(200, 403)"
          - "[RESPONSE_TIME] < 3000"

      # ── API Tier: ingest pods ─────────────────────────────────────────
      # Hits api-ingest service directly via cluster DNS — bypasses Traefik
      # so a slow Traefik or LB issue is isolated from API health here.
      # If these slow down it's the api-ingest pod's event loop or the
      # Postgres primary that's the problem.

      - name: api-ingest — liveness
        group: API — Ingest Tier
        url: http://api-ingest.rejourney.svc.cluster.local:3000/health/live
        interval: 30s
        conditions:
          - "[STATUS] == 200"
          - "[RESPONSE_TIME] < 500"

      - name: api-ingest — readiness (DB + Redis)
        group: API — Ingest Tier
        url: http://api-ingest.rejourney.svc.cluster.local:3000/health/ready
        interval: 1m
        conditions:
          - "[STATUS] == 200"
          - "[RESPONSE_TIME] < 1500"

      - name: api-ingest — ingest path
        group: API — Ingest Tier
        url: http://api-ingest.rejourney.svc.cluster.local:3000/health/ingest
        interval: 1m
        conditions:
          - "[STATUS] == 200"
          - "[RESPONSE_TIME] < 1000"

      - name: api-ingest — BullMQ queue
        group: API — Ingest Tier
        url: http://api-ingest.rejourney.svc.cluster.local:3000/health/queue
        interval: 1m
        conditions:
          - "[STATUS] == 200"
          - "[BODY].status != critical"
          - "[RESPONSE_TIME] < 1500"

      # ── API Tier: dashboard pods ──────────────────────────────────────
      # Hits api-dashboard service directly. The readiness probe here also
      # exercises the dbRead pool (DATABASE_URL_READ → pgbouncer-ro →
      # postgres-local-ro), so failure surfaces standby/replica problems
      # that api-ingest pods don't see.

      - name: api-dashboard — liveness
        group: API — Dashboard Tier
        url: http://api-dashboard.rejourney.svc.cluster.local:3000/health/live
        interval: 30s
        conditions:
          - "[STATUS] == 200"
          - "[RESPONSE_TIME] < 500"

      - name: api-dashboard — readiness (DB + Redis + dbRead)
        group: API — Dashboard Tier
        url: http://api-dashboard.rejourney.svc.cluster.local:3000/health/ready
        interval: 1m
        conditions:
          - "[STATUS] == 200"
          - "[RESPONSE_TIME] < 2500"

      # ── Ingest Upload (relay) ─────────────────────────────────────────

      - name: ingest-upload — relay
        group: Upload Relay
        url: http://ingest-upload.rejourney.svc.cluster.local:3001/health
        interval: 1m
        conditions:
          - "[STATUS] == 200"
          - "[RESPONSE_TIME] < 1000"

      # ── Web (dashboard SPA backend) ───────────────────────────────────

      - name: web — internal
        group: Web
        url: http://web.rejourney.svc.cluster.local
        interval: 1m
        conditions:
          - "[STATUS] == 200"
          - "[RESPONSE_TIME] < 1500"

      # ── Data Plane ────────────────────────────────────────────────────
      # TCP reachability. Distinguishes pgbouncer (rw) from pgbouncer-ro
      # so we can tell whether the dashboard's read path is broken even
      # when writes look fine.

      - name: Postgres primary (via pgbouncer rw)
        group: Data Plane
        url: tcp://pgbouncer.rejourney.svc.cluster.local:5432
        interval: 30s
        conditions:
          - "[CONNECTED] == true"

      - name: Postgres standby (via pgbouncer-ro)
        group: Data Plane
        url: tcp://pgbouncer-ro.rejourney.svc.cluster.local:5432
        interval: 30s
        conditions:
          - "[CONNECTED] == true"

      - name: CNPG primary (postgres-app-rw)
        group: Data Plane
        url: tcp://postgres-app-rw.rejourney.svc.cluster.local:5432
        interval: 30s
        conditions:
          - "[CONNECTED] == true"

      - name: CNPG replica (postgres-local-ro)
        group: Data Plane
        url: tcp://postgres-local-ro.rejourney.svc.cluster.local:5432
        interval: 30s
        conditions:
          - "[CONNECTED] == true"

      - name: Redis (Sentinel master)
        group: Data Plane
        url: tcp://redis.rejourney.svc.cluster.local:6379
        interval: 30s
        conditions:
          - "[CONNECTED] == true"

      # ── TLS cert expiry ───────────────────────────────────────────────
      # Fires when < 14 days remain. Cloudflare may legitimately return 403
      # for bot challenges, so we only assert on the cert here, not the body.

      - name: TLS — api.rejourney.co
        group: TLS Certificates
        url: https://api.rejourney.co
        interval: 1h
        conditions:
          - "[CERTIFICATE_EXPIRATION] > 336h"

      - name: TLS — ingest.rejourney.co
        group: TLS Certificates
        url: https://ingest.rejourney.co
        interval: 1h
        conditions:
          - "[CERTIFICATE_EXPIRATION] > 336h"

      - name: TLS — rejourney.co
        group: TLS Certificates
        url: https://rejourney.co
        interval: 1h
        conditions:
          - "[CERTIFICATE_EXPIRATION] > 336h"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gatus
  namespace: rejourney
  labels:
    app: gatus
    app.kubernetes.io/part-of: rejourney
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: gatus
  template:
    metadata:
      labels:
        app: gatus
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: gatus
          image: twinproduction/gatus:v5.12.0
          env:
            - name: GATUS_CONFIG_PATH
              value: /config/config.yaml
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: config
              mountPath: /config
            - name: data
              mountPath: /data
          resources:
            requests:
              cpu: 10m
              memory: 30Mi
            limits:
              cpu: 100m
              memory: 64Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: config
          configMap:
            name: gatus-config
        - name: data
          persistentVolumeClaim:
            claimName: gatus-data

---
apiVersion: v1
kind: Service
metadata:
  name: gatus
  namespace: rejourney
  labels:
    app: gatus
    app.kubernetes.io/part-of: rejourney
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: 8080
  selector:
    app: gatus
