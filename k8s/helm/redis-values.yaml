# Bitnami Redis Helm values for the current production Redis layout.
#
# IMPORTANT: This file is NOT applied by deploy-release.sh (it only reads k8s/ root, not subdirectories).
# Install/upgrade manually:
#   helm install redis bitnami/redis -n rejourney -f k8s/helm/redis-values.yaml
#   helm upgrade redis bitnami/redis -n rejourney -f k8s/helm/redis-values.yaml
#
# Bitnami Sentinel topology: `replica.replicaCount` is the redis-node StatefulSet
# size. quorum: 1 means any single surviving Sentinel can elect a new master —
# correct for a 2-sentinel cluster. redis-node-0 on fsn1, redis-node-1 on
# quorum-1 (preferred anti-affinity keeps them on separate nodes).

architecture: replication

commonConfiguration: |-
  # Enable ReJSON and RediSearch modules used by the dashboard feature set.
  loadmodule /opt/bitnami/redis/lib/redis/modules/redisearch.so
  loadmodule /opt/bitnami/redis/lib/redis/modules/rejson.so
  # Persist writes with AOF; disable RDB snapshots to avoid duplicate work.
  appendonly yes
  save ""

sentinel:
  enabled: true
  # quorum: 1 is correct for a 2-sentinel cluster. quorum: 2 would require BOTH
  # sentinels alive to agree on failover — if the master's node dies, neither
  # sentinel can meet quorum and Redis gets stuck. With quorum: 1, any single
  # surviving sentinel can promote a new master.
  quorum: 1
  # Bitnami's `resourcesPreset` ("nano" by default) silently overrides `resources:` —
  # must be set to "none" for our explicit limits below to take effect.
  resourcesPreset: "none"
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

replica:
  replicaCount: 2
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            labelSelector:
              matchLabels:
                app.kubernetes.io/name: redis
            topologyKey: kubernetes.io/hostname
  configuration: |
    maxmemory 900mb
    maxmemory-policy allkeys-lru
    save 900 1
  # In Sentinel mode the redis-node StatefulSet reads resources from the
  # replica block, even when the single pod is acting as the master.
  resourcesPreset: "none"
  resources:
    requests:
      cpu: 75m
      memory: 256Mi
    limits:
      cpu: "1500m"
      memory: 1536Mi

global:
  # Safe Phase 1 prep: changing this does not move the existing live PVC.
  # Redis will only switch storage classes after the StatefulSet/PVC is
  # recreated during the manual cutover phase.
  storageClass: rejourney-db-local-retain

master:
  persistence:
    size: 8Gi
  configuration: |
    maxmemory 900mb
    maxmemory-policy allkeys-lru
    save 900 1
  # See sentinel.resourcesPreset note above — same override applies here.
  # Node now has 12 CPU / 24 GiB. Redis is still far from its ceiling in prod,
  # but we give it a bit more burst room so it doesn't become the next avoidable
  # bottleneck while Postgres/API use the extra headroom.
  resourcesPreset: "none"
  resources:
    requests:
      cpu: 75m
      memory: 256Mi
    limits:
      cpu: "1500m"
      memory: 1536Mi

auth:
  existingSecret: redis-secret
  existingSecretPasswordKey: REDIS_PASSWORD

metrics:
  enabled: true           # deploys redis-exporter sidecar; scraped by VictoriaMetrics on port 9121
  serviceMonitor:
    enabled: false        # we use VictoriaMetrics static scrape, not prometheus-operator
  resourcesPreset: "none"
  resources:
    requests:
      cpu: 25m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 96Mi
