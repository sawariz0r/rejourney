---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: replay-worker
  namespace: rejourney
  labels:
    app.kubernetes.io/part-of: rejourney
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: replay-worker
  minReplicas: 1
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 55
