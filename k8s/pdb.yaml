# Pod Disruption Budgets
# Ensures node drain / voluntary disruptions never take down all pods of a service simultaneously.

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: api-pdb
  namespace: rejourney
  labels:
    app.kubernetes.io/part-of: rejourney
spec:
  minAvailable: 3
  selector:
    matchLabels:
      app: api

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: web-pdb
  namespace: rejourney
  labels:
    app.kubernetes.io/part-of: rejourney
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: web

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: pgbouncer-pdb
  namespace: rejourney
  labels:
    app.kubernetes.io/part-of: rejourney
spec:
  minAvailable: 2  # 3 replicas, 1 per node — only 1 disruption at a time; blocks node drain during rolling update
  selector:
    matchLabels:
      app: pgbouncer

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: ingest-upload-pdb
  namespace: rejourney
  labels:
    app.kubernetes.io/part-of: rejourney
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: ingest-upload

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: ingest-worker-pdb
  namespace: rejourney
  labels:
    app.kubernetes.io/part-of: rejourney
spec:
  minAvailable: 3  # 5 min replicas (HPA) — ensures queue processing never fully stalls during disruptions
  selector:
    matchLabels:
      app: ingest-worker

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: replay-worker-pdb
  namespace: rejourney
  labels:
    app.kubernetes.io/part-of: rejourney
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: replay-worker
