# Redis — managed by Bitnami Helm chart (Phase 1-C)
#
# The standalone Redis Deployment, Service, and PVC that used to live here
# were replaced by the Bitnami Redis chart with Sentinel mode during Phase 1-C.
#
# Helm release: redis  (namespace: rejourney)
# Chart:        bitnami/redis  v25+
# Install:      helm upgrade --install redis bitnami/redis -n rejourney -f k8s/redis-values.yaml
#
# Key resources created by the chart (do NOT manage these with kubectl apply):
#   StatefulSet:  redis-node          (master + sentinel in each pod)
#   Service:      redis               (port 6379 → master, port 26379 → sentinel)
#   Service:      redis-headless      (direct pod DNS: redis-node-0.redis-headless...)
#
# Apps connect via REDIS_SENTINEL_HOST=redis.rejourney.svc.cluster.local
# Legacy REDIS_URL is kept for reference but ignored when Sentinel mode is active.
