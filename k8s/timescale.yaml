# TimescaleDB CNPG cluster for ts_recording_artifacts hypertable.
#
# CI applies this file automatically (it's in k8s/ which deploy-release.sh applies).
# Before the first deploy, create the required secrets via SSH:
#   kubectl create secret generic timescale-app-secret \
#     --from-literal=username=app --from-literal=password='<pw>' -n rejourney
#   kubectl create secret generic timescale-secret \
#     --from-literal=TIMESCALE_URL='postgresql://app:<pw>@timescale-local-rw.rejourney.svc.cluster.local/rejourney_ts' \
#     -n rejourney
#   kubectl apply -f /opt/rejourney/k8s/timescale.yaml
#
# Node placement: podAntiAffinityType=required spreads instances across nodes.
# Primary lands on FSN1 (most headroom, 12vCPU/24GB), standby on quorum-1
# (HEL1, no existing DB standby). worker-1 already carries the Postgres standby.

apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: timescale-local
  namespace: rejourney
  labels:
    app.kubernetes.io/part-of: rejourney
spec:
  instances: 2

  # Sync replication: same model as main Postgres cluster.
  # FSN1 → quorum-1 RTT is <5ms (both EU Hetzner). Zero data loss on failover
  # once TS becomes the authoritative artifact store (Phase 5+).
  minSyncReplicas: 1
  maxSyncReplicas: 1

  affinity:
    # No nodeSelector — required anti-affinity across all 3 nodes is sufficient.
    # CNPG places primary on FSN1 (most resources) and standby on quorum-1.
    enablePodAntiAffinity: true
    topologyKey: kubernetes.io/hostname
    podAntiAffinityType: required

  imageName: timescale/timescaledb-ha:pg18.3-ts2.26.4-oss

  postgresql:
    parameters:
      max_connections: "50"
      synchronous_commit: "remote_write"
      shared_buffers: "1GB"
      effective_cache_size: "3GB"
      work_mem: "32MB"
      maintenance_work_mem: "128MB"
      timescaledb.max_background_workers: "4"
    shared_preload_libraries:
      - timescaledb

  resources:
    requests:
      cpu: "500m"
      memory: "2Gi"
    limits:
      cpu: "4"
      memory: "4Gi"

  storage:
    storageClass: rejourney-db-local-retain
    size: 100Gi

  bootstrap:
    initdb:
      database: rejourney_ts
      owner: app
      secret:
        name: timescale-app-secret
