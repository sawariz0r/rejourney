# Traefik HelmChartConfig for k3s
# Configures Traefik to trust Cloudflare proxy headers for real client IP forwarding
#
# This file is applied separately from the rejourney namespace resources
# because it targets kube-system where k3s's built-in Traefik runs.
#
# Cloudflare IP ranges are from: https://www.cloudflare.com/ips/
# Last updated: 2026-02-07

apiVersion: helm.cattle.io/v1
kind: HelmChartConfig
metadata:
  name: traefik
  namespace: kube-system
spec:
  valuesContent: |-
    # Hetzner Cloud Load Balancer — provisioned automatically by Hetzner CCM
    # when it detects these annotations on the Traefik LoadBalancer Service.
    # Applied during Phase 1-C maintenance window (CCM must be installed first).
    #
    # 1 replica pinned to FSN1. With externalTrafficPolicy:Local, the Hetzner LB
    # health check on worker-1's nodeport fails when no Traefik pod is there, so
    # the LB naturally routes all traffic to FSN1. On FSN1 failure Traefik reschedules
    # to HEL1 (~90s) and the LB recovers automatically — HA preserved, cross-DC
    # ingress routing eliminated in normal operation.
    deployment:
      replicas: 1

    affinity:
      nodeAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            preference:
              matchExpressions:
                - key: kubernetes.io/hostname
                  operator: In
                  values:
                    - ubuntu-4gb-fsn1-1
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
            - matchExpressions:
                - key: kubernetes.io/hostname
                  operator: NotIn
                  values:
                    - rejourney-quorum-1

    service:
      annotations:
        load-balancer.hetzner.cloud/location: fsn1
        load-balancer.hetzner.cloud/use-private-ip: "true"
        load-balancer.hetzner.cloud/algorithm-type: round_robin
      spec:
        externalTrafficPolicy: Local

    # Expose Prometheus metrics for VictoriaMetrics to scrape
    metrics:
      prometheus:
        addEntryPointsLabels: true
        addServicesLabels: true
        addRoutersLabels: true
        entryPoint: metrics

    ports:
      # Internal-only metrics endpoint (not exposed externally)
      metrics:
        port: 9100
        expose:
          default: false
      web:
        forwardedHeaders:
          trustedIPs:
            # Hetzner private network (LB→node traffic via private IP)
            - 10.0.0.0/16
            # Cloudflare IPv4 ranges
            - 173.245.48.0/20
            - 103.21.244.0/22
            - 103.22.200.0/22
            - 103.31.4.0/22
            - 141.101.64.0/18
            - 108.162.192.0/18
            - 190.93.240.0/20
            - 188.114.96.0/20
            - 197.234.240.0/22
            - 198.41.128.0/17
            - 162.158.0.0/15
            - 104.16.0.0/13
            - 104.24.0.0/14
            - 172.64.0.0/13
            - 131.0.72.0/22
            # Cloudflare IPv6 ranges
            - 2400:cb00::/32
            - 2606:4700::/32
            - 2803:f800::/32
            - 2405:b500::/32
            - 2405:8100::/32
            - 2c0f:f248::/32
            - 2a06:98c0::/29
      websecure:
        forwardedHeaders:
          trustedIPs:
            # Hetzner private network (LB→node traffic via private IP)
            - 10.0.0.0/16
            # Cloudflare IPv4 ranges
            - 173.245.48.0/20
            - 103.21.244.0/22
            - 103.22.200.0/22
            - 103.31.4.0/22
            - 141.101.64.0/18
            - 108.162.192.0/18
            - 190.93.240.0/20
            - 188.114.96.0/20
            - 197.234.240.0/22
            - 198.41.128.0/17
            - 162.158.0.0/15
            - 104.16.0.0/13
            - 104.24.0.0/14
            - 172.64.0.0/13
            - 131.0.72.0/22
            # Cloudflare IPv6 ranges
            - 2400:cb00::/32
            - 2606:4700::/32
            - 2803:f800::/32
            - 2405:b500::/32
            - 2405:8100::/32
            - 2c0f:f248::/32
            - 2a06:98c0::/29
