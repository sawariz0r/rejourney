# VictoriaMetrics - Lightweight Prometheus-compatible time-series metrics
# Replaces: NetData (metrics backend), Traefik Dashboard (visualized via Grafana)
# Access: kubectl -n rejourney port-forward svc/victoria-metrics 8428:8428
#         http://127.0.0.1:8428  (raw query UI + /api/v1 PromQL)

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: victoria-metrics-data
  namespace: rejourney
  labels:
    app.kubernetes.io/part-of: rejourney
spec:
  storageClassName: local-path
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: victoria-metrics-scrape
  namespace: rejourney
  labels:
    app.kubernetes.io/part-of: rejourney
data:
  scrape.yaml: |
    global:
      scrape_interval: 30s
      scrape_timeout: 10s

    scrape_configs:
      # Node / VPS system metrics (CPU, RAM, disk, network)
      - job_name: node-exporter
        relabel_configs:
          - target_label: cluster
            replacement: rejourney-prod
        static_configs:
          - targets: ['node-exporter.rejourney.svc.cluster.local:9100']

      # Per-container resource usage for Kubernetes workloads
      - job_name: cadvisor
        relabel_configs:
          - target_label: cluster
            replacement: rejourney-prod
        metric_relabel_configs:
          - source_labels: [container_label_io_kubernetes_pod_name]
            target_label: pod
          - source_labels: [container_label_io_kubernetes_pod_namespace]
            target_label: namespace
          - source_labels: [container_label_io_kubernetes_container_name]
            target_label: container
          - source_labels: [container_label_io_kubernetes_pod_uid]
            target_label: pod_uid
        static_configs:
          - targets: ['cadvisor.rejourney.svc.cluster.local:8080']

      # Kubernetes object state (pod status, deployment replicas, etc.)
      - job_name: kube-state-metrics
        relabel_configs:
          - target_label: cluster
            replacement: rejourney-prod
        static_configs:
          - targets: ['kube-state-metrics.rejourney.svc.cluster.local:8080']

      # PostgreSQL metrics (connections, query stats, table sizes, bloat)
      # scrape_timeout raised to 30s because our custom S3-observability queries
      # scan the recording_artifacts table (6M+ rows/week). Even with indexes,
      # the full batch can take ~15s. The global 10s timeout caused all custom
      # query metrics to be silently dropped.
      - job_name: postgres-exporter
        scrape_timeout: 30s
        relabel_configs:
          - target_label: cluster
            replacement: rejourney-prod
        static_configs:
          - targets: ['postgres-exporter.rejourney.svc.cluster.local:9187']

      # Worker heartbeats pushed by application workers
      - job_name: pushgateway
        honor_labels: true
        relabel_configs:
          - target_label: cluster
            replacement: rejourney-prod
        static_configs:
          - targets: ['pushgateway.rejourney.svc.cluster.local:9091']

      # Traefik request metrics (requests/s, latency, error rate per route)
      - job_name: traefik
        relabel_configs:
          - target_label: cluster
            replacement: rejourney-prod
        static_configs:
          - targets: ['traefik-metrics.kube-system.svc.cluster.local:9100']

      # VictoriaMetrics self-metrics
      - job_name: victoria-metrics
        relabel_configs:
          - target_label: cluster
            replacement: rejourney-prod
        static_configs:
          - targets: ['localhost:8428']

      # Bitnami Redis exporter sidecar (single master in Phase 1; scales with replicas in Phase 2)
      - job_name: redis
        relabel_configs:
          - target_label: cluster
            replacement: rejourney-prod
          - target_label: namespace
            replacement: rejourney
        static_configs:
          - targets: ['redis-metrics.rejourney.svc.cluster.local:9121']

      # CloudNativePG instance metrics — pod SD picks up all postgres cluster members automatically
      - job_name: cnpg
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: [rejourney]
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_cnpg_io_cluster]
            action: keep
            regex: postgres
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod
          - source_labels: [__meta_kubernetes_pod_label_cnpg_io_instanceRole]
            target_label: role
          - source_labels: [__meta_kubernetes_pod_ip]
            regex: (.+)
            replacement: '${1}:9187'
            target_label: __address__
          - target_label: cluster
            replacement: rejourney-prod
          - target_label: namespace
            replacement: rejourney

      # Kubelet volume + node stats (needed for PVC usage panels in infra dashboard)
      - job_name: kubelet
        scheme: https
        tls_config:
          insecure_skip_verify: true
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        kubernetes_sd_configs:
          - role: node
        relabel_configs:
          - replacement: kubernetes.default.svc:443
            target_label: __address__
          - source_labels: [__meta_kubernetes_node_name]
            regex: (.+)
            replacement: /api/v1/nodes/${1}/proxy/metrics
            target_label: __metrics_path__
          - target_label: cluster
            replacement: rejourney-prod

---
# RBAC — required by kubernetes_sd_configs (cnpg pod discovery, kubelet node discovery)
apiVersion: v1
kind: ServiceAccount
metadata:
  name: victoria-metrics
  namespace: rejourney
  labels:
    app.kubernetes.io/part-of: rejourney

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: victoria-metrics
  labels:
    app.kubernetes.io/part-of: rejourney
rules:
  - apiGroups: [""]
    resources: [nodes, nodes/proxy, nodes/metrics, pods, endpoints, services]
    verbs: [get, list, watch]
  - nonResourceURLs: ["/metrics"]
    verbs: [get]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: victoria-metrics
  labels:
    app.kubernetes.io/part-of: rejourney
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: victoria-metrics
subjects:
  - kind: ServiceAccount
    name: victoria-metrics
    namespace: rejourney

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: victoria-metrics
  namespace: rejourney
  labels:
    app: victoria-metrics
    app.kubernetes.io/part-of: rejourney
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: victoria-metrics
  template:
    metadata:
      labels:
        app: victoria-metrics
    spec:
      serviceAccountName: victoria-metrics
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: victoria-metrics
          image: victoriametrics/victoria-metrics:v1.102.0
          args:
            - -storageDataPath=/victoria-metrics-data
            - -retentionPeriod=90d
            - -httpListenAddr=:8428
            - -promscrape.config=/etc/vm/scrape.yaml
            - -promscrape.configCheckInterval=30s
            - -search.maxQueryLen=16384
          ports:
            - containerPort: 8428
          volumeMounts:
            - name: data
              mountPath: /victoria-metrics-data
            - name: scrape-config
              mountPath: /etc/vm
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8428
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8428
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: victoria-metrics-data
        - name: scrape-config
          configMap:
            name: victoria-metrics-scrape

---
apiVersion: v1
kind: Service
metadata:
  name: victoria-metrics
  namespace: rejourney
  labels:
    app: victoria-metrics
    app.kubernetes.io/part-of: rejourney
spec:
  type: ClusterIP
  ports:
    - port: 8428
      targetPort: 8428
  selector:
    app: victoria-metrics
