# Web (Dashboard) Deployment for Rejourney
# React Router v7 SSR app served by Node.js

---
apiVersion: v1
kind: Service
metadata:
  name: web
  namespace: rejourney
  labels:
    app: web
    app.kubernetes.io/part-of: rejourney
  annotations:
    # During rolling updates, SSR HTML and hashed CSS/JS must come from the
    # same pod image. Without sticky routing, HTML can be served by the new pod
    # while /assets/* is routed to an old pod that does not have that hash.
    traefik.ingress.kubernetes.io/service.sticky.cookie: "true"
    traefik.ingress.kubernetes.io/service.sticky.cookie.name: "_rj_web_backend"
    traefik.ingress.kubernetes.io/service.sticky.cookie.secure: "true"
    traefik.ingress.kubernetes.io/service.sticky.cookie.httponly: "true"
    traefik.ingress.kubernetes.io/service.sticky.cookie.samesite: "lax"
    traefik.ingress.kubernetes.io/service.sticky.cookie.maxage: "300"
    traefik.ingress.kubernetes.io/service.sticky.cookie.path: "/"
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 8080
  selector:
    app: web

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: rejourney
  labels:
    app.kubernetes.io/part-of: rejourney
spec:
  replicas: 2
  minReadySeconds: 10
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      terminationGracePeriodSeconds: 30
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 80
              preference:
                matchExpressions:
                  - key: topology.kubernetes.io/zone
                    operator: In
                    values: ["fsn1-dc14"]
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: web
                topologyKey: kubernetes.io/hostname
      imagePullSecrets:
        - name: ghcr-secret
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000  # node user
        fsGroup: 1000
      containers:
        - name: web
          image: ghcr.io/rejourneyco/rejourney/web:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 10"]
          env:
            - name: NODE_ENV
              value: "production"
            - name: NODE_OPTIONS
              value: "--max-old-space-size=256"
            - name: PORT
              value: "8080"
            - name: API_URL
              # Browser dashboard requests hit the web pod first and are then
              # proxied here. Keep operator/dashboard API work on api-dashboard
              # pods instead of the api-ingest compatibility alias.
              value: "http://api-dashboard:3000"
            - name: VITE_STRIPE_PUBLISHABLE_KEY
              valueFrom:
                secretKeyRef:
                  name: stripe-secret
                  key: VITE_STRIPE_PUBLISHABLE_KEY
                  optional: true
            - name: VITE_MAPBOX_TOKEN
              valueFrom:
                secretKeyRef:
                  name: mapbox-secret
                  key: VITE_MAPBOX_TOKEN
                  optional: true
            - name: VITE_TURNSTILE_SITE_KEY
              valueFrom:
                secretKeyRef:
                  name: turnstile-secret
                  key: TURNSTILE_SITE_KEY
                  optional: true
          resources:
            requests:
              cpu: 200m
              memory: 384Mi
            limits:
              cpu: 750m
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
