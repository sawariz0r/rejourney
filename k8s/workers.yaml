---
# Stripe Sync Worker CronJob
# Hourly reconciliation of team billing state against Stripe.
# Corrects desynced billingCycleAnchor, stripePriceId, paymentFailedAt,
# and migrates project_usage period keys when the anchor shifts.
# Safe to run at any time: no-op for teams already in sync.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: stripe-sync-worker
  namespace: rejourney
  labels:
    app.kubernetes.io/part-of: rejourney
spec:
  schedule: "17 * * * *"   # offset from :00 to spread load
  startingDeadlineSeconds: 300
  suspend: false
  concurrencyPolicy: Forbid  # skip if previous run still going
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 5
  jobTemplate:
    spec:
      activeDeadlineSeconds: 1800  # 30 min hard cap
      backoffLimit: 1
      template:
        metadata:
          labels:
            app: stripe-sync-worker
        spec:
          restartPolicy: OnFailure
          affinity:
            nodeAffinity:
              preferredDuringSchedulingIgnoredDuringExecution:
                - weight: 100
                  preference:
                    matchExpressions:
                      - key: workload
                        operator: In
                        values: ["worker"]
          imagePullSecrets:
            - name: ghcr-secret
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            fsGroup: 1000
          containers:
            - name: worker
              image: ghcr.io/rejourneyco/rejourney/api:latest
              imagePullPolicy: Always
              command: ["node", "dist/worker/stripeSyncWorker.js"]
              env:
                - name: NODE_ENV
                  value: production
                - name: DATABASE_URL
                  valueFrom:
                    secretKeyRef:
                      name: postgres-secret
                      key: PGBOUNCER_URL
                - name: REDIS_URL
                  valueFrom:
                    secretKeyRef:
                      name: redis-secret
                      key: REDIS_URL
                - name: REDIS_SENTINEL_HOST
                  value: "redis.rejourney.svc.cluster.local"
                - name: REDIS_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: redis-secret
                      key: REDIS_PASSWORD
                      optional: true
                - name: STRIPE_SECRET_KEY
                  valueFrom:
                    secretKeyRef:
                      name: stripe-secret
                      key: STRIPE_SECRET_KEY
                # Required by app config validation
                - name: JWT_SECRET
                  valueFrom:
                    secretKeyRef:
                      name: app-secret
                      key: JWT_SECRET
                - name: INGEST_HMAC_SECRET
                  valueFrom:
                    secretKeyRef:
                      name: app-secret
                      key: INGEST_HMAC_SECRET
                - name: STORAGE_ENCRYPTION_KEY
                  valueFrom:
                    secretKeyRef:
                      name: app-secret
                      key: STORAGE_ENCRYPTION_KEY
                      optional: true
                - name: PUSHGATEWAY_URL
                  value: "http://pushgateway.rejourney.svc.cluster.local:9091"
              resources:
                requests:
                  cpu: 150m
                  memory: 192Mi
                limits:
                  cpu: 750m
                  memory: 384Mi
