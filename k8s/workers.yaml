                - name: RESEARCH_LAKE_REGION
                  valueFrom:
                    secretKeyRef:
                      name: research-lake-secret
                      key: RESEARCH_LAKE_REGION
                      optional: true
                - name: RESEARCH_LAKE_ACCESS_KEY_ID
                  valueFrom:
                    secretKeyRef:
                      name: research-lake-secret
                      key: RESEARCH_LAKE_ACCESS_KEY_ID
                - name: RESEARCH_LAKE_SECRET_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: research-lake-secret
                      key: RESEARCH_LAKE_SECRET_ACCESS_KEY
                - name: RESEARCH_LAKE_PREFIX
                  value: "v1"
                - name: RESEARCH_LAKE_CURATED_PREFIX
                  value: "v1_curated"
                - name: RESEARCH_LAKE_COMPACTOR_LOOKBACK_DAYS
