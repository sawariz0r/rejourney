# Retention Worker CronJob
# Cleans up expired recordings, S3 leftovers, and post-retention identity without overlap
apiVersion: batch/v1
kind: CronJob
metadata:
  name: retention-worker
  namespace: rejourney
  labels:
    app.kubernetes.io/part-of: rejourney
spec:
  schedule: "*/5 * * * *"
  startingDeadlineSeconds: 300
  suspend: false
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 5
  jobTemplate:
    spec:
      activeDeadlineSeconds: 600
      backoffLimit: 1
      template:
        metadata:
          labels:
            app: retention-worker
        spec:
          restartPolicy: OnFailure
          affinity:
            nodeAffinity:
              preferredDuringSchedulingIgnoredDuringExecution:
                - weight: 100
                  preference:
                    matchExpressions:
                      - key: workload
                        operator: In
                        values: ["worker"]
          imagePullSecrets:
            - name: ghcr-secret
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            fsGroup: 1000
          containers:
            - name: worker
              image: ghcr.io/rejourneyco/rejourney/api:latest
              imagePullPolicy: Always
              command:
                - node
                - dist/worker/retentionWorker.js
                - --once
                - --trigger=scheduled
              env:
                - name: NODE_ENV
                  value: production
                - name: DATABASE_URL
                  valueFrom:
                    secretKeyRef:
                      name: postgres-secret
                      key: PGBOUNCER_URL
                - name: REDIS_URL
                  valueFrom:
                    secretKeyRef:
                      name: redis-secret
                      key: REDIS_URL
                - name: REDIS_SENTINEL_HOST
                  value: "redis.rejourney.svc.cluster.local"
                - name: REDIS_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: redis-secret
                      key: REDIS_PASSWORD
                      optional: true
                - name: S3_ENDPOINT
                  valueFrom:
                    secretKeyRef:
                      name: s3-secret
                      key: S3_ENDPOINT
                - name: S3_BUCKET
                  valueFrom:
                    secretKeyRef:
                      name: s3-secret
                      key: S3_BUCKET
                - name: S3_REGION
                  valueFrom:
                    secretKeyRef:
                      name: s3-secret
                      key: S3_REGION
                - name: S3_ACCESS_KEY_ID
                  valueFrom:
                    secretKeyRef:
                      name: s3-secret
                      key: S3_ACCESS_KEY_ID
                - name: S3_SECRET_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: s3-secret
                      key: S3_SECRET_ACCESS_KEY
                - name: R2_ENDPOINT
                  valueFrom:
                    secretKeyRef:
                      name: db-backup-secret
                      key: R2_ENDPOINT
                - name: R2_BUCKET
                  valueFrom:
                    secretKeyRef:
                      name: db-backup-secret
                      key: R2_BUCKET
                - name: R2_REGION
                  valueFrom:
                    secretKeyRef:
                      name: db-backup-secret
                      key: BACKUP_S3_REGION
                      optional: true
                - name: R2_ACCESS_KEY_ID
                  valueFrom:
                    secretKeyRef:
                      name: db-backup-secret
                      key: AWS_ACCESS_KEY_ID
                - name: R2_SECRET_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: db-backup-secret
                      key: AWS_SECRET_ACCESS_KEY
                - name: JWT_SECRET
                  valueFrom:
                    secretKeyRef:
                      name: app-secret
                      key: JWT_SECRET
                - name: INGEST_HMAC_SECRET
                  valueFrom:
                    secretKeyRef:
                      name: app-secret
                      key: INGEST_HMAC_SECRET
                - name: STORAGE_ENCRYPTION_KEY
                  valueFrom:
                    secretKeyRef:
                      name: app-secret
                      key: STORAGE_ENCRYPTION_KEY
                - name: PUSHGATEWAY_URL
                  value: "http://pushgateway.rejourney.svc.cluster.local:9091"
                - name: RETENTION_BATCH_SIZE
                  value: "100"
                - name: RETENTION_REPAIR_BATCH_SIZE
                  value: "100"
                - name: RETENTION_MAX_RUNTIME_MS
                  value: "240000"
                - name: RETENTION_S3_CONCURRENCY
                  value: "4"
              resources:
                requests:
                  cpu: 150m
                  memory: 256Mi
                limits:
                  cpu: "750m"
                  memory: 768Mi


