              env:
                - name: RESEARCH_LAKE_ENDPOINT
                  valueFrom:
                    secretKeyRef:
                      name: research-lake-secret
                      key: RESEARCH_LAKE_ENDPOINT
                      optional: true
                - name: RESEARCH_LAKE_BUCKET
                  valueFrom:
                    secretKeyRef:
                      name: research-lake-secret
