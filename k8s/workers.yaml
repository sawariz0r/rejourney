# Alert Worker Deployment
# Processes and sends alert emails for crashes, ANRs, error spikes, etc.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alert-worker
  namespace: rejourney
  labels:
    app.kubernetes.io/part-of: rejourney
spec:
  replicas: 1
  selector:
    matchLabels:
      app: alert-worker
  template:
    metadata:
      labels:
        app: alert-worker
    spec:
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: rejourney.co/datacenter
                    operator: In
                    values: ["hel1"]
      imagePullSecrets:
        - name: ghcr-secret
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: worker
          image: ghcr.io/rejourneyco/rejourney/api:latest
          imagePullPolicy: Always
          command: ["node", "dist/worker/alertWorker.js"]
          env:
            - name: NODE_ENV
              value: production
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: PGBOUNCER_URL
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: redis-secret
                  key: REDIS_URL
            - name: REDIS_SENTINEL_HOST
              value: "redis.rejourney.svc.cluster.local"
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: redis-secret
                  key: REDIS_PASSWORD
                  optional: true
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: JWT_SECRET
            - name: INGEST_HMAC_SECRET
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: INGEST_HMAC_SECRET
            # SMTP for alert emails
            - name: SMTP_HOST
              valueFrom:
                secretKeyRef:
                  name: smtp-secret
                  key: SMTP_HOST
                  optional: true
            - name: SMTP_PORT
              valueFrom:
                secretKeyRef:
                  name: smtp-secret
                  key: SMTP_PORT
                  optional: true
            - name: SMTP_USER
              valueFrom:
                secretKeyRef:
                  name: smtp-secret
                  key: SMTP_USER
                  optional: true
            - name: SMTP_PASS
              valueFrom:
                secretKeyRef:
                  name: smtp-secret
                  key: SMTP_PASS
                  optional: true
            - name: SMTP_FROM
              valueFrom:
                secretKeyRef:
                  name: smtp-secret
                  key: SMTP_FROM
                  optional: true
            - name: SMTP_SECURE
              valueFrom:
                secretKeyRef:
                  name: smtp-secret
                  key: SMTP_SECURE
                  optional: true
            # Public URL for email links (from app-secret)
            - name: PUBLIC_DASHBOARD_URL
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: PUBLIC_DASHBOARD_URL
                  optional: true
            # Monitoring
            - name: PUSHGATEWAY_URL
              value: "http://pushgateway.rejourney.svc.cluster.local:9091"
          resources:
            requests:
              cpu: 100m
              memory: 192Mi
            limits:
              cpu: 500m
              memory: 384Mi

