# Ingest Worker Deployment for Rejourney
# Background worker processing uploaded artifacts

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ingest-worker
  namespace: rejourney
  labels:
    app.kubernetes.io/part-of: rejourney
spec:
  replicas: 8
  strategy:
    type: RollingUpdate
    rollingUpdate:
      # Avoid requiring spare cluster CPU during worker deploys. Losing one
      # background worker briefly is safer than wedging the rollout.
      maxUnavailable: 1
      maxSurge: 0
  selector:
    matchLabels:
      app: ingest-worker
  template:
    metadata:
      labels:
        app: ingest-worker
    spec:
      terminationGracePeriodSeconds: 60
      # Prefer HEL1 (weight 100). Falls back to FSN1 only when HEL1 is full.
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: rejourney.co/datacenter
                    operator: In
                    values: ["hel1"]
      imagePullSecrets:
        - name: ghcr-secret
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: worker
          image: ghcr.io/rejourneyco/rejourney/api:latest
          imagePullPolicy: Always
          command: ["node", "dist/worker/ingestArtifactWorker.js"]
          env:
            - name: NODE_ENV
              value: production
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: PGBOUNCER_URL
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: redis-secret
                  key: REDIS_URL
            - name: REDIS_SENTINEL_HOST
              value: "redis.rejourney.svc.cluster.local"
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: redis-secret
                  key: REDIS_PASSWORD
                  optional: true
            # ClickHouse analytics projection (disabled unless clickhouse-secret flags are true)
            - name: CLICKHOUSE_ENABLED
              valueFrom:
                secretKeyRef:
                  name: clickhouse-secret
                  key: CLICKHOUSE_ENABLED
                  optional: true
            - name: CLICKHOUSE_DUAL_WRITE_ENABLED
              valueFrom:
                secretKeyRef:
                  name: clickhouse-secret
                  key: CLICKHOUSE_DUAL_WRITE_ENABLED
                  optional: true
            - name: CLICKHOUSE_READS_ENABLED
              valueFrom:
                secretKeyRef:
                  name: clickhouse-secret
                  key: CLICKHOUSE_READS_ENABLED
                  optional: true
            - name: CLICKHOUSE_URL
              valueFrom:
                secretKeyRef:
                  name: clickhouse-secret
                  key: CLICKHOUSE_URL
                  optional: true
            - name: CLICKHOUSE_USER
              valueFrom:
                secretKeyRef:
                  name: clickhouse-secret
                  key: CLICKHOUSE_USER
                  optional: true
            - name: CLICKHOUSE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: clickhouse-secret
                  key: CLICKHOUSE_PASSWORD
                  optional: true
            - name: CLICKHOUSE_DATABASE
              valueFrom:
                secretKeyRef:
                  name: clickhouse-secret
                  key: CLICKHOUSE_DATABASE
                  optional: true
            - name: S3_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: s3-secret
                  key: S3_ENDPOINT
            - name: S3_BUCKET
              valueFrom:
                secretKeyRef:
                  name: s3-secret
                  key: S3_BUCKET
            - name: S3_REGION
              valueFrom:
                secretKeyRef:
                  name: s3-secret
                  key: S3_REGION
            - name: S3_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: s3-secret
                  key: S3_ACCESS_KEY_ID
            - name: S3_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: s3-secret
                  key: S3_SECRET_ACCESS_KEY
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: JWT_SECRET
            - name: INGEST_HMAC_SECRET
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: INGEST_HMAC_SECRET
            - name: STORAGE_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: STORAGE_ENCRYPTION_KEY
            # Monitoring
            - name: PUSHGATEWAY_URL
              value: "http://pushgateway.rejourney.svc.cluster.local:9091"
            # SMTP (for alert emails)
            - name: SMTP_HOST
              valueFrom:
                secretKeyRef:
                  name: smtp-secret
                  key: SMTP_HOST
                  optional: true
            - name: SMTP_PORT
              valueFrom:
                secretKeyRef:
                  name: smtp-secret
                  key: SMTP_PORT
                  optional: true
            - name: SMTP_USER
              valueFrom:
                secretKeyRef:
                  name: smtp-secret
                  key: SMTP_USER
                  optional: true
            - name: SMTP_PASS
              valueFrom:
                secretKeyRef:
                  name: smtp-secret
                  key: SMTP_PASS
                  optional: true
            - name: SMTP_FROM
              valueFrom:
                secretKeyRef:
                  name: smtp-secret
                  key: SMTP_FROM
                  optional: true
            - name: SMTP_SECURE
              valueFrom:
                secretKeyRef:
                  name: smtp-secret
                  key: SMTP_SECURE
                  optional: true
            # Public URL for email links (from app-secret)
            - name: PUBLIC_DASHBOARD_URL
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: PUBLIC_DASHBOARD_URL
                  optional: true
            - name: RJ_INGEST_JOB_CONCURRENCY
              value: "20"
            - name: RJ_INGEST_BATCH_SIZE
              value: "75"
            - name: RJ_INGEST_MAX_RUNNABLE_PER_SESSION
              value: "6"
            - name: RJ_SESSION_EFFECTS_DELAY_MS
              value: "15000"
          resources:
            requests:
              cpu: 750m
              memory: 512Mi
            limits:
              cpu: "4000m"
              memory: 1536Mi
          # No standard HTTP port, but we can check if the process is alive via command or if it has a health server
          # For now, let's assume it doesn't have a health server yet, but we can add one or use a dummy check
          # Actually, workers usually have some internal state. Let's add a dummy check if none exists
          # or wait for implementation. For production, a real check is better.
          # The user's code mentioned monitoring.pingWorker, which could be used.

