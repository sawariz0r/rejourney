---
# Manual local ClickHouse historical import job for api_endpoint_daily_stats.
# Apply directly when you want to exercise the imported-history read path.
apiVersion: batch/v1
kind: Job
metadata:
  name: clickhouse-backfill-api-stats
  namespace: rejourney-local
  labels:
    app.kubernetes.io/component: clickhouse-backfill
spec:
  ttlSecondsAfterFinished: 86400
  backoffLimit: 1
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-postgres
          image: postgres:18-alpine
          command:
            - /bin/sh
            - -c
            - |
              echo "Waiting for PostgreSQL to be ready..."
              until pg_isready -h pgbouncer -p 5432 -U rejourney; do
                echo "PostgreSQL not ready, waiting 5s..."
                sleep 5
              done
              echo "PostgreSQL is ready."
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD
        - name: wait-clickhouse
          image: curlimages/curl:8.11.1
          command:
            - /bin/sh
            - -c
            - |
              echo "Waiting for ClickHouse to be ready..."
              until curl -fsS http://clickhouse:8123/ping >/dev/null; do
                echo "ClickHouse not ready, waiting 5s..."
                sleep 5
              done
              echo "ClickHouse is ready."
      containers:
        - name: backfill
          image: rejourney-local/migration:dev
          imagePullPolicy: IfNotPresent
          command: ["node", "--import", "tsx", "scripts/backfillClickHouseApiEndpointStats.ts"]
          env:
            - name: NODE_ENV
              value: production
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: PGBOUNCER_URL
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: JWT_SECRET
            - name: INGEST_HMAC_SECRET
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: INGEST_HMAC_SECRET
            - name: CLICKHOUSE_ENABLED
              value: "true"
            - name: CLICKHOUSE_DUAL_WRITE_ENABLED
              value: "false"
            - name: CLICKHOUSE_READS_ENABLED
              value: "false"
            - name: CLICKHOUSE_URL
              valueFrom:
                secretKeyRef:
                  name: clickhouse-secret
                  key: CLICKHOUSE_URL
            - name: CLICKHOUSE_USER
              valueFrom:
                secretKeyRef:
                  name: clickhouse-secret
                  key: CLICKHOUSE_USER
            - name: CLICKHOUSE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: clickhouse-secret
                  key: CLICKHOUSE_PASSWORD
            - name: CLICKHOUSE_DATABASE
              valueFrom:
                secretKeyRef:
                  name: clickhouse-secret
                  key: CLICKHOUSE_DATABASE
            - name: CLICKHOUSE_CUTOVER_DATE
              valueFrom:
                secretKeyRef:
                  name: clickhouse-secret
                  key: CLICKHOUSE_CUTOVER_DATE
                  optional: true
            - name: CLICKHOUSE_REQUEST_TIMEOUT_MS
              value: "30000"
            - name: CLICKHOUSE_BACKFILL_BATCH_SIZE
              value: "5000"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 750m
              memory: 768Mi
